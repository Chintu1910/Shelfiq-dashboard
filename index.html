<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ShelfIQ — Seller Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070d1a;--surface:#0e1625;--surface2:#131e30;
  --border:#1c2d44;--border2:#243650;
  --teal:#00e5c3;--teal-dim:rgba(0,229,195,0.12);
  --red:#ff4757;--red-dim:rgba(255,71,87,0.12);
  --amber:#ffb020;--amber-dim:rgba(255,176,32,0.12);
  --blue:#4d9fff;--blue-dim:rgba(77,159,255,0.12);
  --text:#d8e4f0;--text2:#6b83a0;--text3:#3d566e;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:0;z-index:100}
.header-inner{max-width:1500px;margin:0 auto;height:56px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--teal);white-space:nowrap}
.logo span{color:var(--text2);font-weight:400}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sync-btn{background:var(--teal-dim);border:1px solid var(--teal);color:var(--teal);padding:4px 14px;border-radius:20px;font-size:11px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .2s;white-space:nowrap}
.sync-btn:hover{background:var(--teal);color:#050d1a}
.sync-btn:disabled{opacity:.4;cursor:not-allowed}
.alert-pill{background:var(--red-dim);border:1px solid var(--red);color:var(--red);padding:3px 12px;border-radius:20px;font-size:11px;display:flex;align-items:center;gap:6px;white-space:nowrap}
.pulse{width:6px;height:6px;background:var(--red);border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.nav{background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-inner{max-width:1500px;margin:0 auto;display:flex;padding:0 16px}
.nav-tab{padding:13px 16px;font-size:12px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;user-select:none}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--teal);border-bottom-color:var(--teal)}
.nav-badge{background:var(--red);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px}
.main{max-width:1500px;margin:0 auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.page{display:flex;flex-direction:column;gap:16px}
.grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px}
.card-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
.stat-label{font-size:10px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px}
.stat-value{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;margin-bottom:3px}
.stat-sub{font-size:11px;color:var(--text2)}
.up{color:var(--teal)!important}.down{color:var(--red)!important}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:700px}
th{text-align:left;padding:9px 12px;color:var(--text2);font-size:10px;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border);white-space:nowrap;font-family:'Syne',sans-serif}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:500;white-space:nowrap}
.b-green{background:var(--teal-dim);color:var(--teal);border:1px solid rgba(0,229,195,.3)}
.b-red{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,71,87,.3)}
.b-amber{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(255,176,32,.3)}
.b-blue{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(77,159,255,.3)}
.wh-cell{display:flex;flex-wrap:wrap;gap:4px}
.wh-pill{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;white-space:nowrap}
.wh-pragati{background:rgba(0,229,195,.1);color:var(--teal);border:1px solid rgba(0,229,195,.25)}
.wh-amazon{background:rgba(255,153,0,.12);color:#ff9900;border:1px solid rgba(255,153,0,.25)}
.wh-noon{background:rgba(255,237,0,.08);color:#d4c200;border:1px solid rgba(255,237,0,.2)}
.wh-micro{background:rgba(77,159,255,.1);color:var(--blue);border:1px solid rgba(77,159,255,.25)}
.wh-damage{background:rgba(255,71,87,.1);color:var(--red);border:1px solid rgba(255,71,87,.25)}
.filters-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.search-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-size:12px;font-family:'JetBrains Mono',monospace;outline:none;transition:border-color .2s;min-width:200px;flex:1;max-width:300px}
.search-box:focus{border-color:var(--teal)}
.search-box::placeholder{color:var(--text3)}
.fbtn{padding:6px 12px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:'JetBrains Mono',monospace;transition:all .15s;user-select:none;white-space:nowrap}
.fbtn:hover{border-color:var(--border2);color:var(--text)}
.fbtn.on{background:var(--teal-dim);border-color:var(--teal);color:var(--teal)}
.fbtn.on-amber{background:var(--amber-dim);border-color:var(--amber);color:var(--amber)}
.fbtn.on-red{background:var(--red-dim);border-color:var(--red);color:var(--red)}
.fbtn.on-blue{background:var(--blue-dim);border-color:var(--blue);color:var(--blue)}
.fbtn.on-amazon{background:rgba(255,153,0,.12);border-color:rgba(255,153,0,.5);color:#ff9900}
.fbtn.on-noon{background:rgba(255,237,0,.08);border-color:rgba(255,237,0,.4);color:#d4c200}
.pagination{display:flex;align-items:center;gap:6px;justify-content:center;padding-top:12px;flex-wrap:wrap}
.page-btn{padding:5px 11px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:'JetBrains Mono',monospace;transition:all .15s}
.page-btn:hover{border-color:var(--teal);color:var(--teal)}
.page-btn.active{background:var(--teal-dim);border-color:var(--teal);color:var(--teal)}
.page-btn:disabled{opacity:.3;cursor:not-allowed}
.page-info{font-size:11px;color:var(--text2)}
.progress-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:10px}
.progress-fill{height:100%;background:var(--teal);border-radius:3px;transition:width .4s}
.sh{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:4px}
.ss{font-size:12px;color:var(--text2);margin-bottom:8px}
.sbar-wrap{display:flex;align-items:center;gap:6px}
.sbar{height:4px;width:50px;background:var(--border);border-radius:2px;overflow:hidden;flex-shrink:0}
.sbar-fill{height:100%;border-radius:2px}
.legend{display:flex;gap:16px;margin-bottom:10px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}
.ldot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.chart-svg{width:100%;overflow:visible;display:block}
.think{display:flex;gap:5px;align-items:center;color:var(--text2);font-size:12px;padding:14px 0}
.tdot{width:6px;height:6px;background:var(--teal);border-radius:50%;animation:blink 1.2s infinite}
.tdot:nth-child(2){animation-delay:.2s}.tdot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
.ai-bar{display:flex;gap:10px;margin-bottom:14px}
.ai-inp{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13px;font-family:'JetBrains Mono',monospace;outline:none;transition:border-color .2s}
.ai-inp:focus{border-color:var(--teal)}
.ai-inp::placeholder{color:var(--text3)}
.ai-send{background:var(--teal);color:#050d1a;border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;white-space:nowrap}
.ai-send:disabled{opacity:.4;cursor:not-allowed}
.ai-resp{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--teal);border-radius:8px;padding:20px;font-size:13px;line-height:1.8;white-space:pre-wrap}
.qbtns{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.qbtn{padding:7px 12px;border:1px solid var(--border);background:var(--surface2);border-radius:20px;font-size:11px;color:var(--text2);cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .15s}
.qbtn:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-dim)}
.empty{text-align:center;padding:36px 20px;color:var(--text2);font-size:13px}
.alert-bar{background:var(--red-dim);border:1px solid rgba(255,71,87,.35);border-radius:8px;padding:12px 16px;font-size:12px;display:flex;gap:10px}
@media(max-width:900px){.grid-5{grid-template-columns:repeat(3,1fr)}.grid-4{grid-template-columns:repeat(2,1fr)}.grid-2{grid-template-columns:1fr}.main{padding:12px}.stat-value{font-size:20px}.sh{font-size:17px}}
@media(max-width:500px){.grid-5,.grid-4{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── WAREHOUSE RULES ───────────────────────────────────────────────────────────
var WH_RULES={
  pragati:  ["pragati","praga"],
  amazon:   ["amazon","fba"],
  noon:     ["noon","fbn"],
  micro:    ["microless","fbm","micro"],
  damage:   ["renewed","wh-d","damage","damaged","wh_d"],
  supermall:["supermall","super mall","reserved"]
};
function classifyWH(name){
  if(!name)return"other";
  var n=name.toLowerCase();
  for(var k in WH_RULES){var kws=WH_RULES[k];for(var i=0;i<kws.length;i++){if(n.indexOf(kws[i])!==-1)return k;}}
  return"other";
}
function processItem(raw){
  var wh={pragati:0,amazon:0,noon:0,micro:0,damage:0,other:0};
  var whList=raw.warehouses||[];
  whList.forEach(function(w){
    var cls=classifyWH(w.warehouse_name);
    if(cls==="supermall")return;
    var qty=w.warehouse_stock_on_hand||0;
    if(wh[cls]!==undefined)wh[cls]+=qty; else wh.other+=qty;
  });
  var sellable=wh.pragati+wh.amazon+wh.noon+wh.micro;
  if(whList.length===0)sellable=raw.stock_on_hand||0;
  return{id:raw.item_id,name:raw.name||"",sku:raw.sku||raw.item_id||"",rate:raw.rate||0,
    sellable:sellable,damage:wh.damage,pragati:wh.pragati,amazon:wh.amazon,noon:wh.noon,micro:wh.micro};
}

// ── STATE ─────────────────────────────────────────────────────────────────────
var S={tab:"overview",items:[],loading:false,loaded:false,error:null,lastSync:null,progress:0,
  search:"",whFilter:"all",statusFilter:"all",page:1,perPage:50};

var DEMO_BB=[
  {sku:"NVD-RTX4070",name:"NVIDIA RTX 4070 GPU",az:true,nn:false,azP:2199,nnP:2350,lost:"14:32 today",lostOn:"Noon"},
  {sku:"APL-IP15-128",name:"iPhone 15 128GB Black",az:false,nn:true,azP:3299,nnP:3199,lost:"09:15 today",lostOn:"Amazon UAE"},
  {sku:"SNG-WH1000XM5",name:"Sony WH-1000XM5",az:true,nn:true,azP:1099,nnP:1099,lost:null,lostOn:null},
  {sku:"SMG-S24U-256",name:"Samsung S24 Ultra",az:false,nn:false,azP:4599,nnP:4450,lost:"Yesterday",lostOn:"Both"},
  {sku:"DYS-V15",name:"Dyson V15 Detect",az:true,nn:true,azP:2799,nnP:2799,lost:null,lostOn:null},
  {sku:"PLY-PS5-SLIM",name:"PlayStation 5 Slim",az:true,nn:false,azP:1999,nnP:2150,lost:"08:00 today",lostOn:"Noon"},
];
var BB_HIST=[{d:"Mon",az:75,nn:82},{d:"Tue",az:80,nn:78},{d:"Wed",az:72,nn:85},{d:"Thu",az:85,nn:80},{d:"Fri",az:78,nn:75},{d:"Sat",az:82,nn:88},{d:"Sun",az:87,nn:83}];
var REV=[{m:"Oct",az:42,nn:28},{m:"Nov",az:48,nn:31},{m:"Dec",az:61,nn:44},{m:"Jan",az:39,nn:26},{m:"Feb",az:52,nn:35},{m:"Mar",az:55,nn:38}];

// ── SYNC ──────────────────────────────────────────────────────────────────────
async function syncZoho(){
  S.loading=true;S.error=null;S.progress=0;S.items=[];S.loaded=false;
  render();
  try{
    // Page 1 first to get total
    var r1=await fetch("/api/zoho?page=1");
    var d1=await r1.json();
    if(!d1||d1.code!==0){
      S.loading=false;
      S.error="Zoho error: "+(d1&&d1.message?d1.message:JSON.stringify(d1));
      render();return;
    }
    var ctx=d1.page_context||{};
    var total=ctx.total||d1.items.length;
    var perPage=200;
    var totalPages=Math.ceil(total/perPage);
    var all=(d1.items||[]).map(processItem);
    S.progress=Math.round((1/totalPages)*100);render();

    for(var p=2;p<=totalPages;p++){
      var r=await fetch("/api/zoho?page="+p);
      var d=await r.json();
      if(d&&d.items)all=all.concat(d.items.map(processItem));
      S.progress=Math.round((p/totalPages)*100);render();
    }
    S.items=all;S.loaded=true;S.loading=false;
    S.lastSync=new Date().toLocaleTimeString("en-AE",{hour:"2-digit",minute:"2-digit"});
    S.page=1;render();
  }catch(e){
    S.loading=false;S.error="Connection error: "+e.message;render();
  }
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function getFiltered(){
  var items=S.items;
  if(S.search.trim()){var q=S.search.toLowerCase();items=items.filter(function(i){return i.name.toLowerCase().indexOf(q)!==-1||i.sku.toLowerCase().indexOf(q)!==-1});}
  if(S.whFilter!=="all")items=items.filter(function(i){return i[S.whFilter]>0});
  if(S.statusFilter==="out")items=items.filter(function(i){return i.sellable<=0});
  else if(S.statusFilter==="low")items=items.filter(function(i){return i.sellable>0&&i.sellable<5});
  else if(S.statusFilter==="good")items=items.filter(function(i){return i.sellable>=5});
  return items;
}
function stockBadge(q){
  if(q<=0)return'<span class="badge b-red">Out of Stock</span>';
  if(q<5)return'<span class="badge b-amber">Low: '+q+'</span>';
  if(q<20)return'<span class="badge b-blue">'+q+' units</span>';
  return'<span class="badge b-green">'+q+' units</span>';
}
function whPills(i){
  var p="";
  if(i.pragati>0)p+='<span class="wh-pill wh-pragati">PRAGATI '+i.pragati+'</span>';
  if(i.amazon>0)p+='<span class="wh-pill wh-amazon">FBA '+i.amazon+'</span>';
  if(i.noon>0)p+='<span class="wh-pill wh-noon">FBN '+i.noon+'</span>';
  if(i.micro>0)p+='<span class="wh-pill wh-micro">FBM '+i.micro+'</span>';
  if(i.damage>0)p+='<span class="wh-pill wh-damage">DMG '+i.damage+'</span>';
  if(!p)p='<span style="color:var(--text3);font-size:11px">–</span>';
  return'<div class="wh-cell">'+p+'</div>';
}
function lineChart(data,k1,k2,c1,c2){
  var W=500,H=155,PL=34,PR=8,PT=8,PB=24,cw=W-PL-PR,ch=H-PT-PB;
  var allV=[];data.forEach(function(d){allV.push(d[k1],d[k2])});
  var mn=Math.min.apply(null,allV)-5,mx=Math.max.apply(null,allV)+5;
  var xs=data.map(function(_,i){return PL+i*(cw/(data.length-1))});
  function fy(v){return PT+ch-(((v-mn)/(mx-mn))*ch)}
  var svg='<svg viewBox="0 0 '+W+' '+H+'" class="chart-svg">';
  [0,.25,.5,.75,1].forEach(function(t){var yy=PT+ch*t,val=Math.round(mx-(mx-mn)*t);svg+='<line x1="'+PL+'" y1="'+yy+'" x2="'+(W-PR)+'" y2="'+yy+'" stroke="#1c2d44" stroke-width="1"/><text x="'+(PL-3)+'" y="'+(yy+4)+'" text-anchor="end" fill="#6b83a0" font-size="9" font-family="monospace">'+val+'</text>';});
  data.forEach(function(d,i){svg+='<text x="'+xs[i]+'" y="'+(H-3)+'" text-anchor="middle" fill="#6b83a0" font-size="9" font-family="monospace">'+esc(d.d)+'</text>';});
  svg+='<polyline points="'+data.map(function(d,i){return xs[i]+","+fy(d[k1])}).join(" ")+'" fill="none" stroke="'+c1+'" stroke-width="2" stroke-linejoin="round"/>';
  svg+='<polyline points="'+data.map(function(d,i){return xs[i]+","+fy(d[k2])}).join(" ")+'" fill="none" stroke="'+c2+'" stroke-width="2" stroke-linejoin="round"/>';
  data.forEach(function(d,i){svg+='<circle cx="'+xs[i]+'" cy="'+fy(d[k1])+'" r="3" fill="'+c1+'"/><circle cx="'+xs[i]+'" cy="'+fy(d[k2])+'" r="3" fill="'+c2+'"/>';});
  return svg+'</svg>';
}
function barChart(data,k1,k2,c1,c2){
  var W=500,H=155,PL=38,PR=8,PT=8,PB=24,cw=W-PL-PR,ch=H-PT-PB;
  var allV=[];data.forEach(function(d){allV.push(d[k1],d[k2])});
  var mx=Math.max.apply(null,allV)*1.1,grpW=cw/data.length,bw=(grpW*0.7)/2;
  var svg='<svg viewBox="0 0 '+W+' '+H+'" class="chart-svg">';
  [0,.25,.5,.75,1].forEach(function(t){var yy=PT+ch*t,val=Math.round(mx*(1-t)/1000);svg+='<line x1="'+PL+'" y1="'+yy+'" x2="'+(W-PR)+'" y2="'+yy+'" stroke="#1c2d44" stroke-width="1"/><text x="'+(PL-3)+'" y="'+(yy+4)+'" text-anchor="end" fill="#6b83a0" font-size="9" font-family="monospace">'+val+'k</text>';});
  data.forEach(function(d,i){var gx=PL+i*grpW+(grpW*0.15),cx=gx+bw,bh1=(d[k1]/mx)*ch,by1=PT+ch-bh1,bh2=(d[k2]/mx)*ch,by2=PT+ch-bh2;svg+='<text x="'+cx+'" y="'+(H-3)+'" text-anchor="middle" fill="#6b83a0" font-size="9" font-family="monospace">'+esc(d.m)+'</text><rect x="'+gx+'" y="'+by1+'" width="'+(bw-1)+'" height="'+bh1+'" fill="'+c1+'" rx="2"/><rect x="'+(gx+bw)+'" y="'+by2+'" width="'+(bw-1)+'" height="'+bh2+'" fill="'+c2+'" rx="2"/>';});
  return svg+'</svg>';
}

// ── PAGES ─────────────────────────────────────────────────────────────────────
function renderOverview(){
  var today=new Date().toLocaleDateString("en-AE",{weekday:"long",day:"numeric",month:"long"});
  var lc=DEMO_BB.filter(function(b){return !b.az||!b.nn}).length;
  var azPct=Math.round(DEMO_BB.filter(function(b){return b.az}).length/DEMO_BB.length*100);
  var nnPct=Math.round(DEMO_BB.filter(function(b){return b.nn}).length/DEMO_BB.length*100);
  var out=0,low=0,dmg=0,whT={pragati:0,amazon:0,noon:0,micro:0};
  if(S.loaded){S.items.forEach(function(i){if(i.sellable<=0)out++;else if(i.sellable<5)low++;dmg+=i.damage;whT.pragati+=i.pragati;whT.amazon+=i.amazon;whT.noon+=i.noon;whT.micro+=i.micro;});}
  var h='<div class="page"><div><div class="sh">Good morning \u2600\uFE0F</div><div class="ss">Seller intelligence summary \u2014 '+esc(today)+'</div></div>';
  if(S.loading){
    h+='<div style="background:var(--teal-dim);border:1px solid rgba(0,229,195,.3);border-radius:8px;padding:14px 18px">';
    h+='<div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--teal);margin-bottom:8px"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div><span>Loading your Zoho Books inventory... '+S.progress+'% complete</span></div>';
    h+='<div class="progress-bar"><div class="progress-fill" style="width:'+S.progress+'%"></div></div></div>';
  } else if(S.error){
    h+='<div style="background:var(--red-dim);border:1px solid rgba(255,71,87,.35);border-radius:8px;padding:14px 18px;font-size:12px;color:var(--red)">\u26a0 '+esc(S.error)+'<br><br><button class="fbtn on-red" onclick="syncZoho()" style="margin-top:4px">Try Again</button></div>';
  } else if(!S.loaded){
    h+='<div style="background:var(--amber-dim);border:1px solid rgba(255,176,32,.35);border-radius:8px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">';
    h+='<div><span style="color:var(--amber);font-size:12px;font-weight:600">\u26a0 Zoho Books not synced</span><div style="color:var(--text2);font-size:11px;margin-top:3px">Load all your products and warehouse data</div></div>';
    h+='<button class="fbtn on" onclick="syncZoho()">\u21bb Sync Now</button></div>';
  } else {
    h+='<div style="background:var(--teal-dim);border:1px solid rgba(0,229,195,.3);border-radius:8px;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">';
    h+='<div style="font-size:12px;color:var(--teal)">&#10003; Zoho Books live \u2014 <strong>'+S.items.length+' products</strong> across all warehouses</div>';
    h+='<div style="font-size:11px;color:var(--text2)">Synced: '+esc(S.lastSync)+'</div></div>';
  }
  DEMO_BB.filter(function(b){return !b.az||!b.nn}).slice(0,2).forEach(function(b){
    h+='<div class="alert-bar"><div style="color:var(--red);flex-shrink:0">\u26a0</div><div><div style="line-height:1.5"><strong>'+esc(b.name)+'</strong> \u2014 Buy Box lost on <strong>'+esc(b.lostOn)+'</strong></div><div style="color:var(--text2);font-size:11px;margin-top:2px">'+esc(b.lost)+'</div></div></div>';
  });
  h+='<div class="grid-5">';
  h+='<div class="stat-card"><div class="stat-label">Amazon Buy Box</div><div class="stat-value" style="color:var(--teal)">'+azPct+'%</div><div class="stat-sub up">&#8593; 3% this week</div></div>';
  h+='<div class="stat-card"><div class="stat-label">Noon Buy Box</div><div class="stat-value" style="color:var(--blue)">'+nnPct+'%</div><div class="stat-sub down">&#8595; 5% this week</div></div>';
  h+='<div class="stat-card"><div class="stat-label">Total Products</div><div class="stat-value">'+(S.loaded?S.items.length:"–")+'</div><div class="stat-sub">'+(S.loaded?"In Zoho Books":"Not synced")+'</div></div>';
  h+='<div class="stat-card"><div class="stat-label">Low / Out of Stock</div><div class="stat-value" style="color:var(--red)">'+(S.loaded?(low+out):"–")+'</div><div class="stat-sub down">'+(S.loaded?"Need attention":"Not synced")+'</div></div>';
  h+='<div class="stat-card"><div class="stat-label">Damaged Units</div><div class="stat-value" style="color:var(--amber)">'+(S.loaded?dmg:"–")+'</div><div class="stat-sub">'+(S.loaded?"WH-D / Renewed":"Not synced")+'</div></div>';
  h+='</div>';
  if(S.loaded){
    h+='<div class="card"><div class="card-title">Warehouse Stock Breakdown</div><div class="grid-4">';
    var whs=[{l:"PRAGATI (Main)",v:whT.pragati,c:"var(--teal)",s:"Main sellable"},
             {l:"Amazon FBA",v:whT.amazon,c:"#ff9900",s:"At Amazon"},
             {l:"Noon FBN",v:whT.noon,c:"#d4c200",s:"At Noon"},
             {l:"Microless FBM",v:whT.micro,c:"var(--blue)",s:"At Microless"}];

      h+='<div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px">';
      h+='<div style="font-size:10px;color:'+w.c+';margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px">'+w.l+'</div>';
      h+='<div style="font-family:Syne,sans-serif;font-size:22px;font-weight:800;color:'+w.c+'">'+w.v.toLocaleString()+'</div>';

  h+='<div class="card"><div class="card-title">Revenue by Platform (AED)</div><div class="legend"><div class="leg"><div class="ldot" style="background:#ff9900"></div>Amazon UAE</div><div class="leg"><div class="ldot" style="background:#d4c200"></div>Noon</div></div>'+barChart(REV,"az","nn","#ff9900","#d4c200")+'</div>';

function renderStock(){
  if(!S.loaded&&!S.loading)return'<div class="page"><div><div class="sh">Stock Replenishment</div></div><div class="card"><div class="empty"><div style="font-size:32px;margin-bottom:12px">&#128722;</div><div style="font-weight:600;color:var(--text);margin-bottom:8px">Connect Zoho Books</div><div style="margin-bottom:20px;color:var(--text2)">Load all your products with full warehouse breakdown</div><button class="ai-send" onclick="syncZoho()">\u21bb Sync Zoho Books</button></div></div></div>';
  if(S.loading)return'<div class="page"><div><div class="sh">Stock Replenishment</div></div><div class="card"><div style="text-align:center;padding:32px"><div class="think" style="justify-content:center;margin-bottom:12px"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div><div style="font-family:Syne,sans-serif;font-size:15px;color:var(--teal);margin-bottom:8px">Loading all products...</div><div style="font-size:12px;color:var(--text2);margin-bottom:12px">'+S.progress+'% complete</div><div class="progress-bar" style="max-width:300px;margin:0 auto"><div class="progress-fill" style="width:'+S.progress+'%"></div></div></div></div></div>';
  var filtered=getFiltered();
  var tp=Math.ceil(filtered.length/S.perPage),cp=Math.min(S.page,Math.max(1,tp));
  var pageItems=filtered.slice((cp-1)*S.perPage,cp*S.perPage);
  var out=S.items.filter(function(i){return i.sellable<=0}).length;
  var low=S.items.filter(function(i){return i.sellable>0&&i.sellable<5}).length;
  var good=S.items.filter(function(i){return i.sellable>=5}).length;
  var dmg=S.items.filter(function(i){return i.damage>0}).length;
  var h='<div class="page"><div><div class="sh">Stock Replenishment</div><div class="ss">'+S.items.length+' products \u2014 synced '+esc(S.lastSync)+' \u2014 SuperMall excluded \u2014 damage tracked separately</div></div>';
  h+='<div class="grid-5">';
  h+='<div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">'+S.items.length+'</div><div class="stat-sub">Products</div></div>';
  h+='<div class="stat-card"><div class="stat-label">In Stock</div><div class="stat-value" style="color:var(--teal)">'+good+'</div><div class="stat-sub up">5+ units</div></div>';
  h+='<div class="stat-card"><div class="stat-label">Low Stock</div><div class="stat-value" style="color:var(--amber)">'+low+'</div><div class="stat-sub down">1–4 units</div></div>';
  h+='<div class="stat-card"><div class="stat-label">Out of Stock</div><div class="stat-value" style="color:var(--red)">'+out+'</div><div class="stat-sub down">Zero units</div></div>';
  h+='<div class="stat-card"><div class="stat-label">Has Damage</div><div class="stat-value" style="color:var(--amber)">'+dmg+'</div><div class="stat-sub">WH-D / Renewed</div></div>';
  h+='</div>';
  h+='<div class="card" style="padding:14px"><div class="filters-bar">';
  h+='<input class="search-box" placeholder="&#128269; Search name or SKU..." value="'+esc(S.search)+'" oninput="setSearch(this.value)"/>';
  h+='<span style="color:var(--text3);padding:0 2px">|</span>';
  h+='<button class="fbtn'+(S.statusFilter==="all"?" on":"")+'" onclick="setStatusFilter(\'all\')">All</button>';
  h+='<button class="fbtn'+(S.statusFilter==="good"?" on":"")+'" onclick="setStatusFilter(\'good\')">&#10003; In Stock</button>';
  h+='<button class="fbtn'+(S.statusFilter==="low"?" on-amber":"")+'" onclick="setStatusFilter(\'low\')">\u26a0 Low</button>';
  h+='<button class="fbtn'+(S.statusFilter==="out"?" on-red":"")+'" onclick="setStatusFilter(\'out\')">&#10007; Out</button>';
  h+='<span style="color:var(--text3);padding:0 2px">|</span>';
  h+='<button class="fbtn'+(S.whFilter==="all"?" on":"")+'" onclick="setWHFilter(\'all\')">All WH</button>';
  h+='<button class="fbtn'+(S.whFilter==="pragati"?" on":"")+'" onclick="setWHFilter(\'pragati\')">PRAGATI</button>';
  h+='<button class="fbtn'+(S.whFilter==="amazon"?" on-amazon":"")+'" onclick="setWHFilter(\'amazon\')">Amazon FBA</button>';
  h+='<button class="fbtn'+(S.whFilter==="noon"?" on-noon":"")+'" onclick="setWHFilter(\'noon\')">Noon FBN</button>';
  h+='<button class="fbtn'+(S.whFilter==="micro"?" on-blue":"")+'" onclick="setWHFilter(\'micro\')">Microless</button>';
  h+='<button class="fbtn'+(S.whFilter==="damage"?" on-red":"")+'" onclick="setWHFilter(\'damage\')">Damage</button>';
  h+='<button class="fbtn" onclick="syncZoho()" style="margin-left:auto">\u21bb Refresh</button>';
  h+='</div><div style="font-size:11px;color:var(--text2);margin-top:8px">Showing '+filtered.length+' of '+S.items.length+' products</div></div>';
  h+='<div class="card"><div class="table-wrap"><table>';
  h+='<thead><tr><th>#</th><th>Product Name</th><th>SKU</th><th>Sellable</th><th>Warehouses</th><th>Damage</th><th>Rate</th><th>Status</th></tr></thead><tbody>';
  if(pageItems.length===0){h+='<tr><td colspan="8" style="text-align:center;color:var(--text2);padding:30px">No products match your filters</td></tr>';}
  else{pageItems.forEach(function(item,idx){
    var q=item.sellable,pct=Math.min(100,(q/50)*100),fc=q<=0?"var(--red)":q<5?"var(--amber)":"var(--teal)";
    h+='<tr><td style="color:var(--text3);font-size:11px">'+((cp-1)*S.perPage+idx+1)+'</td>';
    h+='<td><div style="font-weight:500;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+esc(item.name)+'">'+esc(item.name)+'</div></td>';
    h+='<td style="color:var(--text2);font-size:11px">'+esc(item.sku)+'</td>';
    h+='<td><div class="sbar-wrap"><div class="sbar"><div class="sbar-fill" style="width:'+pct+'%;background:'+fc+'"></div></div><span style="color:'+fc+';font-size:12px;font-weight:600">'+q+'</span></div></td>';
    h+='<td>'+whPills(item)+'</td>';
    h+='<td>'+(item.damage>0?'<span class="badge b-amber">'+item.damage+'</span>':'<span style="color:var(--text3)">–</span>')+'</td>';
    h+='<td style="color:var(--text2)">'+(item.rate>0?"AED "+item.rate.toLocaleString():"–")+'</td>';
    h+='<td>'+stockBadge(q)+'</td></tr>';
  });}
  h+='</tbody></table></div>';
  if(tp>1){
    h+='<div class="pagination">';
    h+='<button class="page-btn" onclick="setPage('+(cp-1)+')" '+(cp<=1?"disabled":"")+'>&#8592;</button>';
    var sp=Math.max(1,cp-2),ep=Math.min(tp,cp+2);
    if(sp>1)h+='<button class="page-btn" onclick="setPage(1)">1</button>'+(sp>2?'<span style="color:var(--text3)">…</span>':"");
    for(var pg=sp;pg<=ep;pg++)h+='<button class="page-btn'+(pg===cp?" active":"")+'" onclick="setPage('+pg+')">'+pg+'</button>';
    if(ep<tp)h+=(ep<tp-1?'<span style="color:var(--text3)">…</span>':"")+'<button class="page-btn" onclick="setPage('+tp+')">'+tp+'</button>';
    h+='<button class="page-btn" onclick="setPage('+(cp+1)+')" '+(cp>=tp?"disabled":"")+'>&#8594;</button>';
    h+='<span class="page-info">Page '+cp+'/'+tp+' &nbsp;|&nbsp; '+filtered.length+' results</span>';
    h+='</div>';
  }
  return h+'</div></div>';
}

function renderBuyBox(){
  var rows="";
  DEMO_BB.forEach(function(b){
    rows+='<tr><td><div style="font-weight:500;margin-bottom:2px">'+esc(b.name)+'</div><div style="font-size:10px;color:var(--text2)">'+esc(b.sku)+'</div></td>';
    rows+='<td><div style="display:flex;align-items:center;gap:6px;font-size:12px"><div style="width:8px;height:8px;border-radius:50%;background:'+(b.az?"var(--teal)":"var(--red)")+';box-shadow:0 0 6px '+(b.az?"var(--teal)":"var(--red)")+'"></div><span style="color:'+(b.az?"var(--teal)":"var(--red)")+'">'+(b.az?"Holding":"Lost")+'</span></div></td>';
    rows+='<td style="color:'+(b.az?"var(--teal)":"var(--text)")+'">AED '+b.azP.toLocaleString()+'</td>';
    rows+='<td><div style="display:flex;align-items:center;gap:6px;font-size:12px"><div style="width:8px;height:8px;border-radius:50%;background:'+(b.nn?"var(--teal)":"var(--red)")+';box-shadow:0 0 6px '+(b.nn?"var(--teal)":"var(--red)")+'"></div><span style="color:'+(b.nn?"var(--teal)":"var(--red)")+'">'+(b.nn?"Holding":"Lost")+'</span></div></td>';
    rows+='<td style="color:'+(b.nn?"var(--teal)":"var(--text)")+'">AED '+b.nnP.toLocaleString()+'</td>';
    rows+='<td>'+(b.lost?'<span style="color:var(--red);font-size:11px">\uD83D\uDD34 '+esc(b.lost)+'</span>':'<span style="color:var(--text3)">–</span>')+'</td></tr>';
  });
  return'<div class="page"><div><div class="sh">Buy Box Monitor</div><div class="ss">Amazon UAE &amp; Noon \u2014 Amazon SP-API coming in Phase 3</div></div>'
    +'<div style="background:var(--amber-dim);border:1px solid rgba(255,176,32,.3);border-radius:8px;padding:12px 16px;font-size:12px;color:var(--amber)">\u26a0 Sample data shown. Real live buy box data connects in the next phase.</div>'
    +'<div class="card"><div class="table-wrap"><table><thead><tr><th>Product</th><th>Amazon UAE</th><th>Price</th><th>Noon</th><th>Price</th><th>Lost At</th></tr></thead><tbody>'+rows+'</tbody></table></div></div></div>';

function renderAI(){
  var ctx=S.loaded
    ?"REAL INVENTORY ("+S.items.length+" products):\nOut of stock: "+S.items.filter(function(i){return i.sellable<=0}).length+"\nLow stock (1-4): "+S.items.filter(function(i){return i.sellable>0&&i.sellable<5}).length+"\nWith damage: "+S.items.filter(function(i){return i.damage>0}).length+"\n\nSample (first 20):\n"+S.items.slice(0,20).map(function(i){return"- "+i.name+" | SKU:"+i.sku+" | Sellable:"+i.sellable+" | FBA:"+i.amazon+" | FBN:"+i.noon+" | PRAGATI:"+i.pragati+" | Damage:"+i.damage}).join("\n")
    :"Zoho not synced yet.";
  window._SYS="You are an expert e-commerce consultant for Amazon UAE and Noon in Dubai.\n\n"+ctx+"\n\nWarehouses: PRAGATI=main stock, FBA=Amazon, FBN=Noon, FBM=Microless, WH-D/Renewed=damaged(excluded from sellable), SuperMall=excluded(reserved).\n\nGive specific actionable advice. Reference product names. Use bullet points.";
  return'<div class="page"><div><div class="sh">AI Business Insights</div><div class="ss">'+(S.loaded?"Using your real "+S.items.length+" product inventory":"Sync Zoho first for real insights")+'</div></div>'
    +'<div class="card"><div class="card-title">&#9889; Quick Analysis</div>'
    +'<div class="qbtns">'
    +'<button class="qbtn" onclick="askAI(\'Which products are critically low or out of stock?\')">Critical stock alerts</button>'
    +'<button class="qbtn" onclick="askAI(\'Which products have damage stock in WH-D I should action?\')">Damage stock advice</button>'
    +'<button class="qbtn" onclick="askAI(\'Which products at FBA or FBN are running low?\')">FBA / FBN low stock</button>'
    +'<button class="qbtn" onclick="askAI(\'What are my top priorities this week?\')">Weekly priorities</button>'
    +'<button class="qbtn" onclick="askAI(\'Which products should I move from PRAGATI to FBA or FBN?\')">Stock transfer advice</button>'
    +'</div>'
    +'<div class="ai-bar"><input class="ai-inp" id="aiInp" placeholder="Ask anything about your inventory, pricing, or strategy..." onkeydown="if(event.key===\'Enter\')askAI()"/><button class="ai-send" id="aiSend" onclick="askAI()">Ask AI \u2192</button></div>'
    +'<div id="aiOut"><div class="empty"><div style="font-size:26px;margin-bottom:8px">\uD83E\uDD16</div><div>'+(S.loaded?"Real inventory loaded — ask anything about your <strong>"+S.items.length+" products</strong>":"Sync Zoho Books first for AI powered by your real data")+'</div></div></div></div></div>';
}

async function askAI(q){
  var inp=document.getElementById("aiInp"),out=document.getElementById("aiOut"),btn=document.getElementById("aiSend");
  var query=q||(inp?inp.value.trim():"");
  if(!query)return;
  if(inp&&q)inp.value=q;
  out.innerHTML='<div class="think"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div><span style="margin-left:8px">Analysing your data...</span></div>';
  if(btn)btn.disabled=true;
  try{
    var res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:window._SYS||"You are an e-commerce consultant.",messages:[{role:"user",content:query}]})});
    var data=await res.json();
    var text=(data.content||[]).map(function(b){return b.text||""}).join("")||"No response.";
    out.innerHTML='<div class="ai-resp">'+text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")+'</div>';
  }catch(e){out.innerHTML='<div class="ai-resp" style="border-left-color:var(--red)">\u26a0 Could not reach AI.</div>';}
  if(btn)btn.disabled=false;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  var lc=DEMO_BB.filter(function(b){return !b.az||!b.nn}).length;
  var stockBadgeCount=S.loaded?S.items.filter(function(i){return i.sellable<5}).length:0;
  var tabs=[{id:"overview",l:"Overview",icon:"&#9672;"},{id:"buybox",l:"Buy Box",icon:"&#11041;",badge:lc},{id:"stock",l:"Stock",icon:"&#11042;",badge:stockBadgeCount},{id:"ai",l:"AI Insights",icon:"&#10022;"}];
  var nav=tabs.map(function(t){return'<div class="nav-tab'+(S.tab===t.id?" active":"")+'" onclick="goTab(\''+t.id+'\')">'+'<span>'+t.icon+'</span><span>'+t.l+'</span>'+(t.badge>0?'<span class="nav-badge">'+t.badge+'</span>':"")+'</div>';}).join("");
  var page="";
  if(S.tab==="overview")page=renderOverview();
  if(S.tab==="buybox")page=renderBuyBox();
  if(S.tab==="stock")page=renderStock();
  if(S.tab==="ai")page=renderAI();
  var syncLabel=S.loading?"Loading "+S.progress+"%...":(S.loaded?"\u21bb Synced "+esc(S.lastSync):"\u21bb Sync Zoho");
  document.getElementById("app").innerHTML=
    '<header class="header"><div class="header-inner"><div class="logo">Shelf<span>IQ</span></div><div class="header-right"><button class="sync-btn" onclick="syncZoho()" '+(S.loading?"disabled":"")+'>'+syncLabel+'</button><div class="alert-pill"><div class="pulse"></div>'+lc+' Buy Box Alerts</div></div></div></header>'
    +'<nav class="nav"><div class="nav-inner">'+nav+'</div></nav>'
    +'<main class="main">'+page+'</main>';
}
function goTab(t){S.tab=t;render()}
function setSearch(v){S.search=v;S.page=1;render()}
function setWHFilter(f){S.whFilter=f;S.page=1;render()}
function setStatusFilter(f){S.statusFilter=f;S.page=1;render()}
function setPage(p){var f=getFiltered();var tp=Math.ceil(f.length/S.perPage);S.page=Math.max(1,Math.min(p,tp));render()}
render();
</script>
