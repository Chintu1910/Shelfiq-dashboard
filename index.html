<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ShelfIQ — Seller Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070d1a;--surface:#0e1625;--surface2:#131e30;
  --border:#1c2d44;--border2:#243650;
  --teal:#00e5c3;--teal-dim:rgba(0,229,195,0.12);
  --red:#ff4757;--red-dim:rgba(255,71,87,0.12);
  --amber:#ffb020;--amber-dim:rgba(255,176,32,0.12);
  --blue:#4d9fff;--blue-dim:rgba(77,159,255,0.12);
  --text:#d8e4f0;--text2:#6b83a0;--text3:#3d566e;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:0;z-index:100}
.header-inner{max-width:1400px;margin:0 auto;height:56px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--teal)}
.logo span{color:var(--text2);font-weight:400}
.alert-pill{background:var(--red-dim);border:1px solid var(--red);color:var(--red);padding:3px 12px;border-radius:20px;font-size:11px;display:flex;align-items:center;gap:6px}
.pulse{width:6px;height:6px;background:var(--red);border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.nav{background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-inner{max-width:1400px;margin:0 auto;display:flex;padding:0 16px}
.nav-tab{padding:13px 16px;font-size:12px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;user-select:none}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--teal);border-bottom-color:var(--teal)}
.nav-badge{background:var(--red);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px}
.main{max-width:1400px;margin:0 auto;padding:24px 20px;display:flex;flex-direction:column;gap:16px}
.page{display:flex;flex-direction:column;gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px}
.card-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px}
.stat-label{font-size:10px;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.8px}
.stat-value{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;margin-bottom:4px}
.stat-sub{font-size:11px;color:var(--text2)}
.up{color:var(--teal)!important}.down{color:var(--red)!important}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:480px}
th{text-align:left;padding:9px 13px;color:var(--text2);font-size:10px;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border);white-space:nowrap;font-family:'Syne',sans-serif}
td{padding:11px 13px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:500}
.badge-win{background:var(--teal-dim);color:var(--teal);border:1px solid rgba(0,229,195,.3)}
.badge-lost{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,71,87,.3)}
.plat{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.plat-az{background:rgba(255,153,0,.15);color:#ff9900;border:1px solid rgba(255,153,0,.3)}
.plat-nn{background:rgba(255,237,0,.1);color:#d4c200;border:1px solid rgba(255,237,0,.25)}
.bb{display:flex;align-items:center;gap:6px;font-size:12px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-g{background:var(--teal);box-shadow:0 0 6px var(--teal)}
.dot-r{background:var(--red);box-shadow:0 0 6px var(--red)}
.filter-row{display:flex;gap:8px;flex-wrap:wrap}
.fbtn{padding:6px 13px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:'JetBrains Mono',monospace;transition:all .15s;user-select:none}
.fbtn:hover{border-color:var(--border2);color:var(--text)}
.fbtn.on{background:var(--teal-dim);border-color:var(--teal);color:var(--teal)}
.alert-bar{background:var(--red-dim);border:1px solid rgba(255,71,87,.35);border-radius:8px;padding:12px 16px;font-size:12px;display:flex;gap:10px}
.alert-icon{color:var(--red);font-size:15px;flex-shrink:0;margin-top:1px}
.alert-time{color:var(--text2);font-size:11px;margin-top:3px}
.sbar-wrap{display:flex;align-items:center;gap:8px}
.sbar{height:4px;width:56px;background:var(--border);border-radius:2px;overflow:hidden}
.sbar-fill{height:100%;border-radius:2px}
.sh{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:4px}
.ss{font-size:12px;color:var(--text2);margin-bottom:8px}
.legend{display:flex;gap:18px;margin-bottom:10px}
.leg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}
.ldot{width:8px;height:8px;border-radius:50%}
.chart-svg{width:100%;overflow:visible;display:block}
.ai-bar{display:flex;gap:10px;margin-bottom:16px}
.ai-inp{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13px;font-family:'JetBrains Mono',monospace;outline:none;transition:border-color .2s}
.ai-inp:focus{border-color:var(--teal)}
.ai-inp::placeholder{color:var(--text3)}
.ai-send{background:var(--teal);color:#050d1a;border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;white-space:nowrap}
.ai-send:disabled{opacity:.4;cursor:not-allowed}
.ai-resp{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--teal);border-radius:8px;padding:20px;font-size:13px;line-height:1.8;white-space:pre-wrap}
.think{display:flex;gap:5px;align-items:center;color:var(--text2);font-size:12px;padding:14px 0}
.tdot{width:6px;height:6px;background:var(--teal);border-radius:50%;animation:blink 1.2s infinite}
.tdot:nth-child(2){animation-delay:.2s}.tdot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
.qbtns{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.qbtn{padding:7px 12px;border:1px solid var(--border);background:var(--surface2);border-radius:20px;font-size:11px;color:var(--text2);cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .15s}
.qbtn:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-dim)}
.empty{text-align:center;padding:36px 20px;color:var(--text2);font-size:13px}
@media(max-width:768px){
  .grid-4{grid-template-columns:1fr 1fr}
  .grid-2{grid-template-columns:1fr}
  .main{padding:16px 12px}
  .card,.stat-card{padding:14px}
  .stat-value{font-size:24px}
  .sh{font-size:17px}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
var BB=[
  {sku:"NVD-RTX4070",  name:"NVIDIA RTX 4070 GPU",   az:true, nn:false,azP:2199,nnP:2350,lost:"14:32 today",    lostOn:"Noon"},
  {sku:"APL-IP15-128", name:"iPhone 15 128GB Black",  az:false,nn:true, azP:3299,nnP:3199,lost:"09:15 today",    lostOn:"Amazon UAE"},
  {sku:"SNG-WH1000XM5",name:"Sony WH-1000XM5",        az:true, nn:true, azP:1099,nnP:1099,lost:null,             lostOn:null},
  {sku:"SMG-S24U-256", name:"Samsung S24 Ultra",       az:false,nn:false,azP:4599,nnP:4450,lost:"Yesterday 18:00",lostOn:"Both"},
  {sku:"DYS-V15",      name:"Dyson V15 Detect",        az:true, nn:true, azP:2799,nnP:2799,lost:null,             lostOn:null},
  {sku:"LGE-C3-65",    name:'LG C3 65" OLED TV',       az:false,nn:true, azP:8999,nnP:8799,lost:"11:50 today",    lostOn:"Amazon UAE"},
  {sku:"PLY-PS5-SLIM", name:"PlayStation 5 Slim",      az:true, nn:false,azP:1999,nnP:2150,lost:"08:00 today",    lostOn:"Noon"},
  {sku:"NIK-AM-270",   name:"Nike Air Max 270",         az:true, nn:true, azP:449, nnP:449, lost:null,             lostOn:null},
];
var STOCK=[
  {sku:"NVD-RTX4070",  name:"NVIDIA RTX 4070 GPU",  qty:14,az:true, nn:true, sync:"2h ago"},
  {sku:"APL-IP15-128", name:"iPhone 15 128GB Black", qty:8, az:true, nn:false,sync:"5h ago"},
  {sku:"SNG-WH1000XM5",name:"Sony WH-1000XM5",       qty:22,az:true, nn:true, sync:"1h ago"},
  {sku:"SMG-S24U-256", name:"Samsung S24 Ultra",      qty:5, az:false,nn:false,sync:"3h ago"},
  {sku:"DYS-V15",      name:"Dyson V15 Detect",       qty:11,az:false,nn:true, sync:"30m ago"},
  {sku:"LGE-C3-65",    name:'LG C3 65" OLED TV',      qty:3, az:true, nn:false,sync:"4h ago"},
  {sku:"PLY-PS5-SLIM", name:"PlayStation 5 Slim",     qty:19,az:false,nn:false,sync:"6h ago"},
  {sku:"NIK-AM-270",   name:"Nike Air Max 270",        qty:31,az:true, nn:true, sync:"1h ago"},
];
var COMP={
  "NVD-RTX4070":[
    {seller:"★ You",          price:2199,plat:"Amazon UAE",bb:true, r:4.8},
    {seller:"TechZone AE",    price:2149,plat:"Amazon UAE",bb:false,r:4.2},
    {seller:"GadgetHub Dubai",price:2250,plat:"Amazon UAE",bb:false,r:3.9},
    {seller:"NoonRetail",     price:2350,plat:"Noon",       bb:true, r:4.5},
    {seller:"★ You",          price:2350,plat:"Noon",       bb:false,r:4.8},
  ],
  "APL-IP15-128":[
    {seller:"★ You",          price:3299,plat:"Amazon UAE",bb:false,r:4.8},
    {seller:"iStore Official",price:3199,plat:"Amazon UAE",bb:true, r:4.9},
    {seller:"MobileMart",     price:3349,plat:"Amazon UAE",bb:false,r:4.1},
    {seller:"★ You",          price:3199,plat:"Noon",       bb:true, r:4.8},
    {seller:"PhonePlanet",    price:3299,plat:"Noon",       bb:false,r:4.3},
  ],
  "SMG-S24U-256":[
    {seller:"★ You",           price:4599,plat:"Amazon UAE",bb:false,r:4.8},
    {seller:"Samsung Official",price:4499,plat:"Amazon UAE",bb:true, r:5.0},
    {seller:"★ You",           price:4450,plat:"Noon",       bb:false,r:4.8},
    {seller:"ElectroDubai",    price:4399,plat:"Noon",       bb:true, r:4.6},
    {seller:"TechWorld AE",    price:4550,plat:"Noon",       bb:false,r:4.0},
  ],
};
var BB_HIST=[
  {d:"Mon",az:75,nn:82},{d:"Tue",az:80,nn:78},{d:"Wed",az:72,nn:85},
  {d:"Thu",az:85,nn:80},{d:"Fri",az:78,nn:75},{d:"Sat",az:82,nn:88},{d:"Sun",az:87,nn:83}
];
var REV=[
  {m:"Oct",az:42,nn:28},{m:"Nov",az:48,nn:31},{m:"Dec",az:61,nn:44},
  {m:"Jan",az:39,nn:26},{m:"Feb",az:52,nn:35},{m:"Mar",az:55,nn:38}
];
var SYSTEM="You are an expert e-commerce consultant for Amazon UAE and Noon marketplaces in Dubai.\n\nBUY BOX STATUS:\n"+BB.map(function(b){return"- "+b.name+": Amazon="+(b.az?"Winning":"Lost")+" @ AED "+b.azP+", Noon="+(b.nn?"Winning":"Lost")+" @ AED "+b.nnP+(b.lost?", lost "+b.lost:"")}).join("\n")+"\n\nSTOCK (Zoho Books):\n"+STOCK.map(function(s){return"- "+s.name+": "+s.qty+" units, Amazon="+(s.az?"Live":"NOT LISTED")+", Noon="+(s.nn?"Live":"NOT LISTED")}).join("\n")+"\n\nCOMPETITOR PRICING:\n- RTX 4070: TechZone AE @ AED 2149 (winning Amazon BB, you @ 2199)\n- iPhone 15: iStore Official @ AED 3199 (winning Amazon BB, you @ 3299)\n- Samsung S24 Ultra: Samsung Official @ 4499 (Amazon), ElectroDubai @ 4399 (Noon). You @ 4599/4450.\n\nSTATS: Amazon BB rate 75%, Noon 80%. Revenue: Amazon AED 55k/mo, Noon AED 38k/mo.\n\nGive specific, actionable, concise advice. Reference SKUs and prices. Use bullet points.";

var state={tab:"overview",bbFilter:"all",compSku:"NVD-RTX4070"};
var lostCount=BB.filter(function(b){return !b.az||!b.nn}).length;
var unlistedCount=STOCK.filter(function(s){return !s.az||!s.nn}).length;

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function bbDot(win){return '<div class="bb"><div class="dot '+(win?"dot-g":"dot-r")+'"></div><span style="color:'+(win?"var(--teal)":"var(--red")+')">'+win?"Holding":"Lost"+'</span></div>'}
function bbDotH(win){return '<div class="bb"><div class="dot '+(win?"dot-g":"dot-r")+'"></div><span style="color:'+(win?"var(--teal)":"var(--red)")+'">'+( win?"Holding":"Lost")+'</span></div>'}
function badgeH(win){return win?'<span class="badge badge-win">&#10003; Live</span>':'<span class="badge badge-lost">&#10007; Not Listed</span>'}
function platH(p){return '<span class="plat '+(p==="Amazon UAE"?"plat-az":"plat-nn")+'">'+esc(p)+'</span>'}

function lineChart(data,k1,k2,c1,c2){
  var W=500,H=155,PL=34,PR=8,PT=8,PB=24;
  var cw=W-PL-PR,ch=H-PT-PB;
  var allV=[];
  data.forEach(function(d){allV.push(d[k1],d[k2])});
  var mn=Math.min.apply(null,allV)-5,mx=Math.max.apply(null,allV)+5;
  var xs=data.map(function(_,i){return PL+i*(cw/(data.length-1))});
  function fy(v){return PT+ch-(((v-mn)/(mx-mn))*ch)}
  var svg='<svg viewBox="0 0 '+W+' '+H+'" class="chart-svg">';
  [0,.25,.5,.75,1].forEach(function(t){
    var yy=PT+ch*t,val=Math.round(mx-(mx-mn)*t);
    svg+='<line x1="'+PL+'" y1="'+yy+'" x2="'+(W-PR)+'" y2="'+yy+'" stroke="#1c2d44" stroke-width="1"/>';
    svg+='<text x="'+(PL-3)+'" y="'+(yy+4)+'" text-anchor="end" fill="#6b83a0" font-size="9" font-family="JetBrains Mono,monospace">'+val+'</text>';
  });
  data.forEach(function(d,i){
    svg+='<text x="'+xs[i]+'" y="'+(H-3)+'" text-anchor="middle" fill="#6b83a0" font-size="9" font-family="JetBrains Mono,monospace">'+esc(d.d||d.m)+'</text>';
  });
  var p1=data.map(function(d,i){return xs[i]+","+fy(d[k1])}).join(" ");
  var p2=data.map(function(d,i){return xs[i]+","+fy(d[k2])}).join(" ");
  svg+='<polyline points="'+p1+'" fill="none" stroke="'+c1+'" stroke-width="2" stroke-linejoin="round"/>';
  svg+='<polyline points="'+p2+'" fill="none" stroke="'+c2+'" stroke-width="2" stroke-linejoin="round"/>';
  data.forEach(function(d,i){
    svg+='<circle cx="'+xs[i]+'" cy="'+fy(d[k1])+'" r="3" fill="'+c1+'"/>';
    svg+='<circle cx="'+xs[i]+'" cy="'+fy(d[k2])+'" r="3" fill="'+c2+'"/>';
  });
  svg+='</svg>';
  return svg;
}

function barChart(data,k1,k2,c1,c2){
  var W=500,H=155,PL=38,PR=8,PT=8,PB=24;
  var cw=W-PL-PR,ch=H-PT-PB;
  var allV=[];
  data.forEach(function(d){allV.push(d[k1],d[k2])});
  var mx=Math.max.apply(null,allV)*1.1;
  var grpW=cw/data.length,bw=(grpW*0.7)/2;
  var svg='<svg viewBox="0 0 '+W+' '+H+'" class="chart-svg">';
  [0,.25,.5,.75,1].forEach(function(t){
    var yy=PT+ch*t,val=Math.round(mx*(1-t)/1000);
    svg+='<line x1="'+PL+'" y1="'+yy+'" x2="'+(W-PR)+'" y2="'+yy+'" stroke="#1c2d44" stroke-width="1"/>';
    svg+='<text x="'+(PL-3)+'" y="'+(yy+4)+'" text-anchor="end" fill="#6b83a0" font-size="9" font-family="JetBrains Mono,monospace">'+val+'k</text>';
  });
  data.forEach(function(d,i){
    var gx=PL+i*grpW+(grpW*0.15);
    var cx=gx+bw;
    svg+='<text x="'+cx+'" y="'+(H-3)+'" text-anchor="middle" fill="#6b83a0" font-size="9" font-family="JetBrains Mono,monospace">'+esc(d.m)+'</text>';
    var bh1=(d[k1]/mx)*ch,by1=PT+ch-bh1;
    var bh2=(d[k2]/mx)*ch,by2=PT+ch-bh2;
    svg+='<rect x="'+gx+'" y="'+by1+'" width="'+(bw-1)+'" height="'+bh1+'" fill="'+c1+'" rx="2"/>';
    svg+='<rect x="'+(gx+bw)+'" y="'+by2+'" width="'+(bw-1)+'" height="'+bh2+'" fill="'+c2+'" rx="2"/>';
  });
  svg+='</svg>';
  return svg;
}

function renderOverview(){
  var lc=BB.filter(function(b){return !b.az||!b.nn}).length;
  var ul=STOCK.filter(function(s){return !s.az||!s.nn}).length;
  var azP=Math.round(BB.filter(function(b){return b.az}).length/BB.length*100);
  var nnP=Math.round(BB.filter(function(b){return b.nn}).length/BB.length*100);
  var today=new Date().toLocaleDateString("en-AE",{weekday:"long",day:"numeric",month:"long"});
  var h='<div class="page"><div><div class="sh">Good morning \u2600\uFE0F</div><div class="ss">Seller intelligence summary \u2014 '+esc(today)+'</div></div>';
  BB.filter(function(b){return !b.az||!b.nn}).slice(0,2).forEach(function(b){
    h+='<div class="alert-bar"><div class="alert-icon">\u26A0</div><div><div style="line-height:1.5"><strong>'+esc(b.name)+'</strong> \u2014 Buy Box lost on <strong>'+esc(b.lostOn)+'</strong>. Competitor undercut your price.</div><div class="alert-time">Lost at '+esc(b.lost)+'</div></div></div>';
  });
  var stats=[
    {l:"Amazon Buy Box",v:azP+"%",c:"var(--teal)", s:"&#8593; 3% vs last week",cls:"up"},
    {l:"Noon Buy Box",  v:nnP+"%",c:"var(--blue)", s:"&#8595; 5% vs last week",cls:"down"},
    {l:"Unlisted SKUs", v:ul,     c:"var(--amber)",s:"In store, not live",      cls:"down"},
    {l:"Buy Box Losses",v:lc,     c:"var(--red)",  s:"Active now",              cls:"down"},
  ];
  h+='<div class="grid-4">';
  stats.forEach(function(s){h+='<div class="stat-card"><div class="stat-label">'+s.l+'</div><div class="stat-value" style="color:'+s.c+'">'+s.v+'</div><div class="stat-sub '+s.cls+'">'+s.s+'</div></div>'});
  h+='</div>';
  h+='<div class="grid-2">';
  h+='<div class="card"><div class="card-title">Buy Box % \u2014 Last 7 Days</div>';
  h+='<div class="legend"><div class="leg"><div class="ldot" style="background:var(--teal)"></div>Amazon UAE</div><div class="leg"><div class="ldot" style="background:var(--blue)"></div>Noon</div></div>';
  h+=lineChart(BB_HIST,"az","nn","#00e5c3","#4d9fff");
  h+='</div>';
  h+='<div class="card"><div class="card-title">Revenue by Platform (AED)</div>';
  h+='<div class="legend"><div class="leg"><div class="ldot" style="background:#ff9900"></div>Amazon UAE</div><div class="leg"><div class="ldot" style="background:#d4c200"></div>Noon</div></div>';
  h+=barChart(REV,"az","nn","#ff9900","#d4c200");
  h+='</div></div></div>';
  return h;
}

function renderBuyBox(filter){
  var lc=BB.filter(function(b){return !b.az||!b.nn}).length;
  var filtered=BB.filter(function(b){
    if(filter==="lost")    return !b.az||!b.nn;
    if(filter==="winning") return  b.az&&b.nn;
    return true;
  });
  var rows="";
  filtered.forEach(function(item){
    rows+='<tr><td><div style="font-weight:500;margin-bottom:2px">'+esc(item.name)+'</div><div style="font-size:10px;color:var(--text2)">'+esc(item.sku)+'</div></td>';
    rows+=bbDotH(item.az)+'</td><td>';
    rows+='<td>'+bbDotH(item.az)+'</td>';
    rows+='<td style="color:'+(item.az?"var(--teal)":"var(--text)")+'">AED '+item.azP.toLocaleString()+'</td>';
    rows+='<td>'+bbDotH(item.nn)+'</td>';
    rows+='<td style="color:'+(item.nn?"var(--teal)":"var(--text)")+'">AED '+item.nnP.toLocaleString()+'</td>';
    rows+='<td>'+(item.lost?'<span style="color:var(--red);font-size:11px">\uD83D\uDD34 '+esc(item.lost)+'</span>':'<span style="color:var(--text3);font-size:11px">\u2013</span>')+'</td></tr>';
  });
  return '<div class="page"><div><div class="sh">Buy Box Monitor</div><div class="ss">Real-time buy box status across Amazon UAE &amp; Noon</div></div>'
    +'<div class="filter-row">'
    +'<button class="fbtn'+(filter==="all"?" on":"")+'" onclick="setFilter(\'all\')">All SKUs</button>'
    +'<button class="fbtn'+(filter==="lost"?" on":"")+'" onclick="setFilter(\'lost\')">\u26A0 Lost ('+lc+')</button>'
    +'<button class="fbtn'+(filter==="winning"?" on":"")+'" onclick="setFilter(\'winning\')">&#10003; Winning</button>'
    +'</div>'
    +'<div class="card"><div class="table-wrap"><table><thead><tr><th>Product</th><th>Amazon UAE</th><th>Price</th><th>Noon</th><th>Price</th><th>Lost At</th></tr></thead><tbody>'+rows+'</tbody></table></div></div></div>';
}

function renderStock(){
  var issues=STOCK.filter(function(s){return !s.az||!s.nn}).length;
  var stats=[
    {l:"Total SKUs",   v:STOCK.length,                              c:"var(--text)", s:"In Zoho Books"},
    {l:"Not on Amazon",v:STOCK.filter(function(s){return !s.az}).length, c:"var(--red)",  s:"Need listing"},
    {l:"Not on Noon",  v:STOCK.filter(function(s){return !s.nn}).length, c:"var(--amber)",s:"Need listing"},
    {l:"Missing Both", v:STOCK.filter(function(s){return !s.az&&!s.nn}).length,c:"var(--red)",s:"Urgent"},
  ];
  var sc='<div class="grid-4">';
  stats.forEach(function(s){sc+='<div class="stat-card"><div class="stat-label">'+s.l+'</div><div class="stat-value" style="color:'+s.c+'">'+s.v+'</div><div class="stat-sub down">'+s.s+'</div></div>'});
  sc+='</div>';
  var rows="";
  STOCK.forEach(function(item){
    var pct=Math.min(100,(item.qty/35)*100);
    var fc=item.qty>15?"var(--teal)":item.qty>5?"var(--amber)":"var(--red)";
    var hasIssue=!item.az||!item.nn;
    rows+='<tr><td><div style="font-weight:500;margin-bottom:2px">'+esc(item.name)+'</div><div style="font-size:10px;color:var(--text2)">'+esc(item.sku)+'</div></td>';
    rows+='<td><div class="sbar-wrap"><div class="sbar"><div class="sbar-fill" style="width:'+pct+'%;background:'+fc+'"></div></div><span style="font-size:12px;color:'+fc+'">'+item.qty+'</span></div></td>';
    rows+='<td>'+badgeH(item.az)+'</td><td>'+badgeH(item.nn)+'</td>';
    rows+='<td style="color:var(--text2);font-size:11px">'+esc(item.sync)+'</td>';
    rows+='<td>'+(hasIssue?'<button class="fbtn on" style="font-size:10px;padding:4px 10px">List Now \u2192</button>':'<span style="color:var(--text3);font-size:11px">All good</span>')+'</td></tr>';
  });
  return '<div class="page"><div><div class="sh">Stock Replenishment</div><div class="ss">Items in Zoho Books missing from your platforms</div></div>'+sc
    +'<div class="card"><div class="card-title"><span>\u26A0</span> '+issues+' SKUs need listing</div>'
    +'<div class="table-wrap"><table><thead><tr><th>Product</th><th>Stock</th><th>Amazon UAE</th><th>Noon</th><th>Synced</th><th>Action</th></tr></thead><tbody>'+rows+'</tbody></table></div></div></div>';
}

function renderCompetitors(selSku){
  var skus=Object.keys(COMP);
  var data=COMP[selSku]||[];
  var skuBtns=skus.map(function(s){return '<button class="fbtn'+(s===selSku?" on":"")+'" onclick="setCompSku(\''+s+'\')">'+esc(s)+'</button>'}).join("");
  var panels="";
  ["Amazon UAE","Noon"].forEach(function(plat){
    var pd=data.filter(function(d){return d.plat===plat}).sort(function(a,b){return a.price-b.price});
    var low=pd.length?pd[0].price:0;
    var rows="";
    pd.forEach(function(row){
      var isYou=row.seller.indexOf("\u2605")===0;
      var diff=row.price-low;
      rows+='<tr><td style="color:'+(isYou?"var(--teal)":"var(--text)")+';font-weight:'+(isYou?600:400)+'">'+esc(row.seller)+'</td>';
      rows+='<td style="color:'+(isYou?"var(--teal)":row.price===low?"var(--amber)":"var(--text)")+';font-weight:'+(row.price===low?600:400)+'">'+row.price.toLocaleString()+'</td>';
      rows+='<td>'+(row.bb?'<span class="badge badge-win">&#10003;</span>':'<span style="color:var(--text3);font-size:11px">\u2013</span>')+'</td>';
      rows+='<td>'+(diff===0?'<span style="color:var(--amber);font-size:11px">Lowest</span>':'<span style="color:var(--red);font-size:11px">+'+diff+'</span>')+'</td></tr>';
    });
    panels+='<div class="card"><div class="card-title">'+platH(plat)+' Sellers</div>'
      +(pd.length===0?'<div class="empty">No data</div>'
      :'<div class="table-wrap"><table><thead><tr><th>Seller</th><th>Price (AED)</th><th>Buy Box</th><th>vs Lowest</th></tr></thead><tbody>'+rows+'</tbody></table></div>')
      +'</div>';
  });
  return '<div class="page"><div><div class="sh">Competitor Price Tracker</div><div class="ss">Compare prices per SKU across both platforms</div></div>'
    +'<div class="filter-row">'+skuBtns+'</div>'
    +'<div class="grid-2">'+panels+'</div></div>';
}

function renderAI(){
  return '<div class="page"><div><div class="sh">AI Business Insights</div><div class="ss">Your personal e-commerce analyst \u2014 powered by your real data</div></div>'
    +'<div class="card"><div class="card-title">&#9889; Quick Analysis</div>'
    +'<div class="qbtns">'
    +'<button class="qbtn" onclick="askAI(\'Why am I losing the buy box?\')">Why am I losing the buy box?</button>'
    +'<button class="qbtn" onclick="askAI(\'Which SKUs should I reprice first?\')">Which SKUs to reprice first?</button>'
    +'<button class="qbtn" onclick="askAI(\'What is hurting my Noon performance?\')">What\'s hurting Noon performance?</button>'
    +'<button class="qbtn" onclick="askAI(\'Which unlisted products have the most revenue potential?\')">Best unlisted products to list?</button>'
    +'<button class="qbtn" onclick="askAI(\'Give me a weekly action plan to improve sales\')">Give me a weekly action plan</button>'
    +'</div>'
    +'<div class="ai-bar"><input class="ai-inp" id="aiInp" placeholder="Ask anything about your sales, pricing, or strategy..." onkeydown="if(event.key===\'Enter\')askAI()"/>'
    +'<button class="ai-send" id="aiSend" onclick="askAI()">Ask AI \u2192</button></div>'
    +'<div id="aiOut"><div class="empty"><div style="font-size:26px;margin-bottom:8px">\uD83E\uDD16</div><div>Pick a quick prompt or type your own question</div>'
    +'<div style="margin-top:6px;font-size:11px;color:var(--text2)">AI knows your buy box status, stock levels &amp; competitor prices</div></div></div>'
    +'</div></div>';
}

function render(){
  var TABS=[
    {id:"overview",   l:"Overview",    icon:"&#9672;"},
    {id:"buybox",     l:"Buy Box",     icon:"&#11041;",badge:lostCount},
    {id:"stock",      l:"Stock",       icon:"&#11042;",badge:unlistedCount},
    {id:"competitors",l:"Pricing",     icon:"&#9678;"},
    {id:"ai",         l:"AI Insights", icon:"&#10022;"},
  ];
  var nav=TABS.map(function(t){
    return '<div class="nav-tab'+(state.tab===t.id?" active":"")+'" onclick="goTab(\''+t.id+'\')">'
      +'<span>'+t.icon+'</span><span>'+t.l+'</span>'
      +(t.badge>0?'<span class="nav-badge">'+t.badge+'</span>':"")
      +'</div>';
  }).join("");
  var page="";
  if(state.tab==="overview")    page=renderOverview();
  if(state.tab==="buybox")      page=renderBuyBox(state.bbFilter);
  if(state.tab==="stock")       page=renderStock();
  if(state.tab==="competitors") page=renderCompetitors(state.compSku);
  if(state.tab==="ai")          page=renderAI();
  document.getElementById("app").innerHTML=
    '<header class="header"><div class="header-inner"><div class="logo">Shelf<span>IQ</span></div>'
    +'<div class="alert-pill"><div class="pulse"></div>'+lostCount+' Buy Box Alerts</div></div></header>'
    +'<nav class="nav"><div class="nav-inner">'+nav+'</div></nav>'
    +'<main class="main">'+page+'</main>';
}

function goTab(t){state.tab=t;render()}
function setFilter(f){state.bbFilter=f;render()}
function setCompSku(s){state.compSku=s;render()}

async function askAI(q){
  var inp=document.getElementById("aiInp");
  var out=document.getElementById("aiOut");
  var btn=document.getElementById("aiSend");
  var query=q||(inp?inp.value.trim():"");
  if(!query)return;
  if(inp&&q)inp.value=q;
  out.innerHTML='<div class="think"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div><span style="margin-left:8px">Analysing your data...</span></div>';
  if(btn)btn.disabled=true;
  try{
    var res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:SYSTEM,messages:[{role:"user",content:query}]})
    });
    var data=await res.json();
    var text=(data.content||[]).map(function(b){return b.text||""}).join("")||"No response received.";
    out.innerHTML='<div class="ai-resp">'+text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")+'</div>';
  }catch(e){
    out.innerHTML='<div class="ai-resp" style="border-left-color:var(--red)">\u26A0 Could not reach AI. Please check your connection.</div>';
  }
  if(btn)btn.disabled=false;
}

render();
</script>
</body>
</html>
