<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ShelfIQ — Seller Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070d1a;--surface:#0e1625;--surface2:#131e30;
  --border:#1c2d44;--border2:#243650;
  --teal:#00e5c3;--teal-dim:rgba(0,229,195,0.12);
  --red:#ff4757;--red-dim:rgba(255,71,87,0.12);
  --amber:#ffb020;--amber-dim:rgba(255,176,32,0.12);
  --blue:#4d9fff;--blue-dim:rgba(77,159,255,0.12);
  --text:#d8e4f0;--text2:#6b83a0;--text3:#3d566e;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:0;z-index:100}
.header-inner{max-width:1500px;margin:0 auto;height:56px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--teal)}
.logo span{color:var(--text2);font-weight:400}
.header-right{display:flex;align-items:center;gap:8px}
.sync-btn{background:var(--teal-dim);border:1px solid var(--teal);color:var(--teal);padding:4px 14px;border-radius:20px;font-size:11px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .2s;white-space:nowrap}
.sync-btn:hover{background:var(--teal);color:#050d1a}
.sync-btn:disabled{opacity:.4;cursor:not-allowed}
.alert-pill{background:var(--red-dim);border:1px solid var(--red);color:var(--red);padding:3px 12px;border-radius:20px;font-size:11px;display:flex;align-items:center;gap:6px;white-space:nowrap}
.pulse{width:6px;height:6px;background:var(--red);border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.nav{background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-inner{max-width:1500px;margin:0 auto;display:flex;padding:0 16px}
.nav-tab{padding:13px 16px;font-size:12px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;user-select:none}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--teal);border-bottom-color:var(--teal)}
.nav-badge{background:var(--red);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px}
.main{max-width:1500px;margin:0 auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.page{display:flex;flex-direction:column;gap:16px}
.grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px}
.card-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
.stat-label{font-size:10px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px}
.stat-value{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;margin-bottom:3px}
.stat-sub{font-size:11px;color:var(--text2)}
.up{color:var(--teal)!important}.down{color:var(--red)!important}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:900px}
th{text-align:left;padding:10px 12px;color:var(--text2);font-size:10px;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border);white-space:nowrap;font-family:'Syne',sans-serif;background:var(--surface);cursor:pointer;user-select:none}
th:hover{color:var(--text)}
th.sort-on{color:var(--teal)}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:500;white-space:nowrap}
.b-green{background:var(--teal-dim);color:var(--teal);border:1px solid rgba(0,229,195,.3)}
.b-red{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,71,87,.3)}
.b-amber{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(255,176,32,.3)}
.b-blue{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(77,159,255,.3)}
.filters-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.filter-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.filter-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;width:80px;flex-shrink:0}
.search-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.search-wrap{display:flex;flex:1;min-width:240px;max-width:500px}
#searchInput{flex:1;background:var(--surface2);border:1px solid var(--border);border-right:none;border-radius:8px 0 0 8px;padding:9px 14px;color:var(--text);font-size:13px;font-family:'JetBrains Mono',monospace;outline:none;transition:border-color .2s}
#searchInput:focus{border-color:var(--teal)}
#searchInput::placeholder{color:var(--text3)}
.search-go{background:var(--teal);border:1px solid var(--teal);color:#050d1a;border-radius:0 8px 8px 0;padding:9px 18px;font-size:12px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;white-space:nowrap}
.search-go:hover{opacity:.85}
.fbtn{padding:6px 12px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:'JetBrains Mono',monospace;transition:all .15s;user-select:none;white-space:nowrap}
.fbtn:hover{border-color:var(--border2);color:var(--text)}
.fbtn.on{background:var(--teal-dim);border-color:var(--teal);color:var(--teal)}
.fbtn.on-amber{background:var(--amber-dim);border-color:var(--amber);color:var(--amber)}
.fbtn.on-red{background:var(--red-dim);border-color:var(--red);color:var(--red)}
.fbtn.on-blue{background:var(--blue-dim);border-color:var(--blue);color:var(--blue)}
.fbtn.on-amazon{background:rgba(255,153,0,.12);border-color:rgba(255,153,0,.5);color:#ff9900}
.fbtn.on-noon{background:rgba(212,194,0,.08);border-color:rgba(212,194,0,.4);color:#d4c200}
.sort-select{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text2);font-size:11px;font-family:'JetBrains Mono',monospace;outline:none;cursor:pointer}
.sort-select:hover{border-color:var(--teal);color:var(--text)}
.pagination{display:flex;align-items:center;gap:6px;justify-content:center;padding-top:14px;flex-wrap:wrap;border-top:1px solid var(--border);margin-top:4px}
.page-btn{padding:5px 11px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:'JetBrains Mono',monospace;transition:all .15s;min-width:34px;text-align:center}
.page-btn:hover:not(:disabled){border-color:var(--teal);color:var(--teal)}
.page-btn.active{background:var(--teal-dim);border-color:var(--teal);color:var(--teal);font-weight:700}
.page-btn:disabled{opacity:.25;cursor:not-allowed}
.progress-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:10px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--blue));border-radius:3px;transition:width .3s}
.sh{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:4px}
.ss{font-size:12px;color:var(--text2)}
.sbar-wrap{display:flex;align-items:center;gap:6px}
.sbar{height:4px;width:44px;background:var(--border);border-radius:2px;overflow:hidden;flex-shrink:0}
.sbar-fill{height:100%;border-radius:2px}
.legend{display:flex;gap:16px;margin-bottom:10px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}
.ldot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.chart-svg{width:100%;overflow:visible;display:block}
.think{display:flex;gap:5px;align-items:center;color:var(--text2);font-size:12px;padding:14px 0}
.tdot{width:6px;height:6px;background:var(--teal);border-radius:50%;animation:blink 1.2s infinite}
.tdot:nth-child(2){animation-delay:.2s}.tdot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
.ai-bar{display:flex;gap:10px;margin-bottom:14px}
.ai-inp{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13px;font-family:'JetBrains Mono',monospace;outline:none;transition:border-color .2s}
.ai-inp:focus{border-color:var(--teal)}
.ai-inp::placeholder{color:var(--text3)}
.ai-send{background:var(--teal);color:#050d1a;border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;white-space:nowrap}
.ai-send:disabled{opacity:.4;cursor:not-allowed}
.ai-resp{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--teal);border-radius:8px;padding:20px;font-size:13px;line-height:1.8;white-space:pre-wrap}
.qbtns{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.qbtn{padding:7px 12px;border:1px solid var(--border);background:var(--surface2);border-radius:20px;font-size:11px;color:var(--text2);cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .15s}
.qbtn:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-dim)}
.empty{text-align:center;padding:40px 20px;color:var(--text2);font-size:13px}
.alert-bar{background:var(--red-dim);border:1px solid rgba(255,71,87,.35);border-radius:8px;padding:12px 16px;font-size:12px;display:flex;gap:10px}
/* wh number cells */
.wh-num{font-size:13px;font-weight:700}
.wh-p{color:var(--teal)}
.wh-a{color:#ff9900}
.wh-n{color:#d4c200}
.wh-m{color:var(--blue)}
.wh-z{color:var(--text3)}
@media(max-width:1000px){.grid-5{grid-template-columns:repeat(3,1fr)}.grid-4{grid-template-columns:repeat(2,1fr)}.grid-2{grid-template-columns:1fr}.main{padding:12px}}
@media(max-width:600px){.grid-5,.grid-4{grid-template-columns:1fr 1fr}.stat-value{font-size:20px}.sh{font-size:17px}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── WAREHOUSE NAME MATCHING ───────────────────────────────────────────────────
var WH_KEYS={
  pragati:  ["pragati","praga"],
  amazon:   ["amazon","fba"],
  noon:     ["noon","fbn"],
  micro:    ["microless","fbm","micro"],
  damage:   ["renewed","wh-d","damage","damaged","wh_d"],
  supermall:["supermall","super mall","reserved"]
};
function classifyWH(name){
  if(!name)return"other";
  var n=name.toLowerCase();
  for(var k in WH_KEYS)for(var i=0;i<WH_KEYS[k].length;i++)if(n.indexOf(WH_KEYS[k][i])!==-1)return k;
  return"other";
}

// ── STATE ─────────────────────────────────────────────────────────────────────
var S={
  tab:"overview",
  items:[],           // final merged items
  loading:false, loaded:false, error:null, lastSync:null,
  progress:0, progressMsg:"Starting...",
  warehouses:[],      // raw warehouse list from Zoho
  whMap:{},           // warehouse_id -> {name, cls}
  // known warehouse IDs after lookup
  whIds:{pragati:null,amazon:null,noon:null,micro:null},
  // search
  searchApplied:"",
  whFilter:"all",
  statusFilter:"all",
  sortBy:"name", sortDir:"asc",
  page:1, perPage:50
};

// Demo data
var DEMO_BB=[
  {sku:"NVD-RTX4070",name:"NVIDIA RTX 4070 GPU",az:true,nn:false,azP:2199,nnP:2350,lost:"14:32 today",lostOn:"Noon"},
  {sku:"APL-IP15-128",name:"iPhone 15 128GB Black",az:false,nn:true,azP:3299,nnP:3199,lost:"09:15 today",lostOn:"Amazon UAE"},
  {sku:"SNG-WH1000XM5",name:"Sony WH-1000XM5",az:true,nn:true,azP:1099,nnP:1099,lost:null,lostOn:null},
  {sku:"SMG-S24U-256",name:"Samsung S24 Ultra",az:false,nn:false,azP:4599,nnP:4450,lost:"Yesterday",lostOn:"Both"},
  {sku:"DYS-V15",name:"Dyson V15 Detect",az:true,nn:true,azP:2799,nnP:2799,lost:null,lostOn:null},
  {sku:"PLY-PS5-SLIM",name:"PlayStation 5 Slim",az:true,nn:false,azP:1999,nnP:2150,lost:"08:00 today",lostOn:"Noon"},
];
var BB_HIST=[{d:"Mon",az:75,nn:82},{d:"Tue",az:80,nn:78},{d:"Wed",az:72,nn:85},{d:"Thu",az:85,nn:80},{d:"Fri",az:78,nn:75},{d:"Sat",az:82,nn:88},{d:"Sun",az:87,nn:83}];
var REV=[{m:"Oct",az:42,nn:28},{m:"Nov",az:48,nn:31},{m:"Dec",az:61,nn:44},{m:"Jan",az:39,nn:26},{m:"Feb",az:52,nn:35},{m:"Mar",az:55,nn:38}];

// ── SYNC ──────────────────────────────────────────────────────────────────────
async function syncZoho(){
  S.loading=true; S.error=null; S.progress=0; S.loaded=false; S.items=[];
  S.progressMsg="Step 1/3 — Loading warehouse list...";
  render();

  try {
    // STEP 1: Get all warehouses and build ID map
    var wRes = await fetch("/api/zoho?action=warehouses");
    var wData = await wRes.json();
    var warehouses = wData.warehouses || wData.data || [];
    S.warehouses = warehouses;

    // Build warehouse ID -> classification map
    S.whMap = {};
    S.whIds = {pragati:null, amazon:null, noon:null, micro:null};
    warehouses.forEach(function(w){
      var id = w.warehouse_id;
      var name = w.warehouse_name || w.name || "";
      var cls = classifyWH(name);
      S.whMap[id] = {name:name, cls:cls};
      // Map first match for each category (some may have multiple)
      if(cls==="pragati" && !S.whIds.pragati)  S.whIds.pragati = id;
      if(cls==="amazon"  && !S.whIds.amazon)   S.whIds.amazon  = id;
      if(cls==="noon"    && !S.whIds.noon)      S.whIds.noon    = id;
      if(cls==="micro"   && !S.whIds.micro)     S.whIds.micro   = id;
    });

    S.progress=10;
    S.progressMsg="Step 2/3 — Loading all products...";
    render();

    // STEP 2: Load all items (for base data: name, sku, rate, item_id)
    // Also try to read warehouses[] from this response first
    var baseItems = {};
    var page=1, hasMore=true;
    while(hasMore){
      S.progressMsg="Step 2/3 — Loading products... page "+page;
      S.progress = 10 + Math.min(40, page*4);
      render();
      var r = await fetch("/api/zoho?page="+page);
      var d = await r.json();
      if(d.code!==0){ S.loading=false; S.error="Zoho error: "+(d.message||JSON.stringify(d)); render(); return; }
      (d.items||[]).forEach(function(item){
        var id = item.item_id;
        // Try to read warehouse data directly from item if it's there
        var wh = {pragati:0, amazon:0, noon:0, micro:0};
        var wList = item.warehouses || item.warehouse_list || [];
        var hasWHData = false;
        wList.forEach(function(w){
          var wname = w.warehouse_name||w.name||"";
          var wid   = w.warehouse_id||"";
          var cls   = classifyWH(wname) || (S.whMap[wid]?S.whMap[wid].cls:"other");
          if(cls==="supermall"||cls==="damage"||cls==="other")return;
          var qty = Number(w.warehouse_stock_on_hand||w.stock_on_hand||w.quantity_on_hand||0);
          if(qty>0 && wh[cls]!==undefined){ wh[cls]+=qty; hasWHData=true; }
        });
        baseItems[id] = {
          id:id, name:item.name||"", sku:item.sku||"", rate:parseFloat(item.rate||0),
          total:Number(item.stock_on_hand||0),
          pragati:wh.pragati, amazon:wh.amazon, noon:wh.noon, micro:wh.micro,
          hasWH: hasWHData
        };
      });
      hasMore = (d.page_context||{}).has_more_page===true;
      page++;
      if(page>50)break;
    }

    S.progress=50;
    S.progressMsg="Step 3/3 — Loading per-warehouse stock...";
    render();

    // STEP 3: For each of the 4 warehouses, fetch all items with that warehouse_id
    // This gives us the actual per-warehouse stock counts
    var whNames = ["pragati","amazon","noon","micro"];
    var whLabels = ["PRAGATI","Amazon FBA","Noon FBN","Microless"];
    var stepSize = 12;

    for(var wi=0; wi<whNames.length; wi++){
      var whKey = whNames[wi];
      var whId  = S.whIds[whKey];

      if(!whId){
        // No warehouse ID found for this category — skip
        S.progress = 50 + (wi+1)*stepSize;
        S.progressMsg = "Step 3/3 — "+whLabels[wi]+": not found in your warehouses";
        render();
        continue;
      }

      S.progressMsg = "Step 3/3 — Loading "+whLabels[wi]+" stock...";
      var whPage=1, whMore=true;
      while(whMore){
        S.progress = 50 + wi*stepSize + Math.min(stepSize-1, whPage*2);
        render();
        var wr = await fetch("/api/zoho?action=warehouse_items&warehouse_id="+whId+"&page="+whPage);
        var wd = await wr.json();
        if(wd.code===0){
          (wd.items||[]).forEach(function(item){
            var id = item.item_id;
            if(!baseItems[id]) return;
            // The stock_on_hand for this item when filtered by warehouse = that warehouse's qty
            var qty = Number(item.stock_on_hand||item.available_stock||0);
            if(qty>0) baseItems[id][whKey] = qty;
          });
          whMore = (wd.page_context||{}).has_more_page===true;
        } else {
          whMore = false;
        }
        whPage++;
        if(whPage>50)break;
      }
    }

    S.progress=100;
    S.progressMsg="Done!";

    // Build final items array with computed sellable = pragati + amazon + noon + micro
    S.items = Object.values(baseItems).map(function(item){
      var sellable = item.pragati + item.amazon + item.noon + item.micro;
      // If all warehouses are 0 but total > 0, use total as fallback
      if(sellable===0 && item.total>0) sellable=item.total;
      return {
        id:item.id, name:item.name, sku:item.sku, rate:item.rate,
        sellable: sellable,
        pragati:  item.pragati,
        amazon:   item.amazon,
        noon:     item.noon,
        micro:    item.micro,
        total:    item.total
      };
    });

    S.loaded=true; S.loading=false;
    S.lastSync=new Date().toLocaleTimeString("en-AE",{hour:"2-digit",minute:"2-digit"});
    S.page=1;
    render();

  } catch(e) {
    S.loading=false;
    S.error="Error: "+e.message;
    render();
  }
}

// ── FILTER + SORT ─────────────────────────────────────────────────────────────
function getFiltered(){
  var items=S.items;
  if(S.searchApplied.trim()){
    var q=S.searchApplied.toLowerCase();
    items=items.filter(function(i){return i.name.toLowerCase().indexOf(q)!==-1||i.sku.toLowerCase().indexOf(q)!==-1;});
  }
  if(S.whFilter==="pragati") items=items.filter(function(i){return i.pragati>0;});
  else if(S.whFilter==="amazon") items=items.filter(function(i){return i.amazon>0;});
  else if(S.whFilter==="noon")   items=items.filter(function(i){return i.noon>0;});
  else if(S.whFilter==="micro")  items=items.filter(function(i){return i.micro>0;});
  if(S.statusFilter==="out")  items=items.filter(function(i){return i.sellable<=0;});
  else if(S.statusFilter==="low")  items=items.filter(function(i){return i.sellable>0&&i.sellable<5;});
  else if(S.statusFilter==="good") items=items.filter(function(i){return i.sellable>=5;});
  return items.slice().sort(function(a,b){
    var v=0;
    if(S.sortBy==="name")     v=a.name.localeCompare(b.name);
    else if(S.sortBy==="sku") v=a.sku.localeCompare(b.sku);
    else if(S.sortBy==="sellable") v=a.sellable-b.sellable;
    else if(S.sortBy==="pragati")  v=a.pragati-b.pragati;
    else if(S.sortBy==="amazon")   v=a.amazon-b.amazon;
    else if(S.sortBy==="noon")     v=a.noon-b.noon;
    else if(S.sortBy==="micro")    v=a.micro-b.micro;
    else if(S.sortBy==="rate")     v=a.rate-b.rate;
    return S.sortDir==="asc"?v:-v;
  });
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function stockBadge(q){
  if(q<=0) return'<span class="badge b-red">Out of Stock</span>';
  if(q<5)  return'<span class="badge b-amber">Low: '+q+'</span>';
  if(q<20) return'<span class="badge b-blue">'+q+' units</span>';
  return'<span class="badge b-green">'+q+' units</span>';
}
function qCell(q, cls){
  if(q>0) return'<span class="wh-num '+cls+'">'+q+'</span>';
  return'<span class="wh-z">–</span>';
}
function thS(field,label){
  var on=S.sortBy===field?" sort-on":"";
  var arrow=S.sortBy===field?(S.sortDir==="asc"?" ↑":" ↓"):" ⇅";
  return'<th class="'+on+'" onclick="setSort(\''+field+'\')">'+label+'<span style="opacity:.4;font-size:9px;margin-left:3px">'+arrow+'</span></th>';
}
function lineChart(data,k1,k2,c1,c2){
  var W=500,H=155,PL=34,PR=8,PT=8,PB=24,cw=W-PL-PR,ch=H-PT-PB;
  var allV=[];data.forEach(function(d){allV.push(d[k1],d[k2])});
  var mn=Math.min.apply(null,allV)-5,mx=Math.max.apply(null,allV)+5;
  var xs=data.map(function(_,i){return PL+i*(cw/(data.length-1))});
  function fy(v){return PT+ch-(((v-mn)/(mx-mn))*ch)}
  var svg='<svg viewBox="0 0 '+W+' '+H+'" class="chart-svg">';
  [0,.25,.5,.75,1].forEach(function(t){var y=PT+ch*t,v=Math.round(mx-(mx-mn)*t);svg+='<line x1="'+PL+'" y1="'+y+'" x2="'+(W-PR)+'" y2="'+y+'" stroke="#1c2d44" stroke-width="1"/><text x="'+(PL-3)+'" y="'+(y+4)+'" text-anchor="end" fill="#6b83a0" font-size="9" font-family="monospace">'+v+'</text>';});
  data.forEach(function(d,i){svg+='<text x="'+xs[i]+'" y="'+(H-3)+'" text-anchor="middle" fill="#6b83a0" font-size="9" font-family="monospace">'+esc(d.d)+'</text>';});
  svg+='<polyline points="'+data.map(function(d,i){return xs[i]+","+fy(d[k1])}).join(" ")+'" fill="none" stroke="'+c1+'" stroke-width="2" stroke-linejoin="round"/>';
  svg+='<polyline points="'+data.map(function(d,i){return xs[i]+","+fy(d[k2])}).join(" ")+'" fill="none" stroke="'+c2+'" stroke-width="2" stroke-linejoin="round"/>';
  data.forEach(function(d,i){svg+='<circle cx="'+xs[i]+'" cy="'+fy(d[k1])+'" r="3" fill="'+c1+'"/><circle cx="'+xs[i]+'" cy="'+fy(d[k2])+'" r="3" fill="'+c2+'"/>';});
  return svg+'</svg>';
}
function barChart(data,k1,k2,c1,c2){
  var W=500,H=155,PL=38,PR=8,PT=8,PB=24,cw=W-PL-PR,ch=H-PT-PB;
  var allV=[];data.forEach(function(d){allV.push(d[k1],d[k2])});
  var mx=Math.max.apply(null,allV)*1.1,grpW=cw/data.length,bw=(grpW*.7)/2;
  var svg='<svg viewBox="0 0 '+W+' '+H+'" class="chart-svg">';
  [0,.25,.5,.75,1].forEach(function(t){var y=PT+ch*t,v=Math.round(mx*(1-t)/1000);svg+='<line x1="'+PL+'" y1="'+y+'" x2="'+(W-PR)+'" y2="'+y+'" stroke="#1c2d44" stroke-width="1"/><text x="'+(PL-3)+'" y="'+(y+4)+'" text-anchor="end" fill="#6b83a0" font-size="9" font-family="monospace">'+v+'k</text>';});
  data.forEach(function(d,i){var gx=PL+i*grpW+(grpW*.15),cx=gx+bw,bh1=(d[k1]/mx)*ch,by1=PT+ch-bh1,bh2=(d[k2]/mx)*ch,by2=PT+ch-bh2;svg+='<text x="'+cx+'" y="'+(H-3)+'" text-anchor="middle" fill="#6b83a0" font-size="9" font-family="monospace">'+esc(d.m)+'</text><rect x="'+gx+'" y="'+by1+'" width="'+(bw-1)+'" height="'+bh1+'" fill="'+c1+'" rx="2"/><rect x="'+(gx+bw)+'" y="'+by2+'" width="'+(bw-1)+'" height="'+bh2+'" fill="'+c2+'" rx="2"/>';});
  return svg+'</svg>';
}

    rows+='<td>'+(b.lost?'<span style="color:var(--red);font-size:11px">🔴 '+esc(b.lost)+'</span>':'<span style="color:var(--text3)">–</span>')+'</td></tr>';
  });
  return'<div class="page"><div><div class="sh">Buy Box Monitor</div><div class="ss">Amazon UAE & Noon · Amazon SP-API connects in Phase 3</div></div><div style="background:var(--amber-dim);border:1px solid rgba(255,176,32,.3);border-radius:8px;padding:12px 16px;font-size:12px;color:var(--amber)">⚠ Sample data shown. Real buy box data connects in the next phase.</div><div class="card"><div class="table-wrap"><table><thead><tr><th>Product</th><th>Amazon UAE</th><th>Price</th><th>Noon</th><th>Price</th><th>Lost At</th></tr></thead><tbody>'+rows+'</tbody></table></div></div></div>';
}

function renderAI(){
  var ctx=S.loaded
    ?"REAL INVENTORY ("+S.items.length+" products):\n"
      +"Out of stock: "+S.items.filter(function(i){return i.sellable<=0}).length+"\n"
      +"Low stock: "+S.items.filter(function(i){return i.sellable>0&&i.sellable<5}).length+"\n\n"
      +"Sample (first 20):\n"
      +S.items.slice(0,20).map(function(i){return"- "+i.name+" | PRAGATI:"+i.pragati+" | FBA:"+i.amazon+" | FBN:"+i.noon+" | FBM:"+i.micro+" | Total:"+i.sellable}).join("\n")
    :"Zoho not synced yet.";
  window._SYS="You are an expert e-commerce consultant for Amazon UAE and Noon in Dubai.\n\n"+ctx+"\n\nWarehouses: PRAGATI=main stock, FBA=Amazon, FBN=Noon, FBM=Microless. Damage and SuperMall excluded. Give specific actionable advice. Reference product names. Use bullet points.";
  return'<div class="page"><div><div class="sh">AI Business Insights</div><div class="ss">'+(S.loaded?"Using real data from "+S.items.length+" products":"Sync Zoho first for real insights")+'</div></div><div class="card"><div class="card-title">⚡ Quick Analysis</div><div class="qbtns"><button class="qbtn" onclick="askAI(\'Which products are critically low or out of stock?\')">Critical stock alerts</button><button class="qbtn" onclick="askAI(\'Which products at FBA or FBN are running low and need replenishment from PRAGATI?\')">FBA/FBN replenishment</button><button class="qbtn" onclick="askAI(\'Which products have stock at PRAGATI but zero at both FBA and FBN?\')">Unlisted PRAGATI stock</button><button class="qbtn" onclick="askAI(\'What are my top 5 priorities this week?\')">Weekly priorities</button></div><div class="ai-bar"><input class="ai-inp" id="aiInp" placeholder="Ask anything about your inventory, pricing, or strategy..." onkeydown="if(event.key===\'Enter\')askAI()"/><button class="ai-send" id="aiSend" onclick="askAI()">Ask AI →</button></div><div id="aiOut"><div class="empty"><div style="font-size:28px;margin-bottom:10px">🤖</div><div>'+(S.loaded?"Real data loaded! Ask about your <strong>"+S.items.length+" products</strong>":"Sync Zoho Books first")+'</div></div></div></div></div>';
}

async function askAI(q){
  var inp=document.getElementById("aiInp"),out=document.getElementById("aiOut"),btn=document.getElementById("aiSend");
  var query=q||(inp?inp.value.trim():"");
  if(!query)return;
  if(inp&&q)inp.value=q;
  out.innerHTML='<div class="think"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div><span style="margin-left:8px">Analysing your data...</span></div>';
  if(btn)btn.disabled=true;
  try{
    var r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:window._SYS||"You are an e-commerce consultant.",messages:[{role:"user",content:query}]})});
    var d=await r.json();
    var text=(d.content||[]).map(function(b){return b.text||""}).join("")||"No response.";
    out.innerHTML='<div class="ai-resp">'+text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")+'</div>';
  }catch(e){out.innerHTML='<div class="ai-resp" style="border-left-color:var(--red)">⚠ Error: '+esc(e.message)+'</div>';}
  if(btn)btn.disabled=false;
}

function render(){
  var lc=DEMO_BB.filter(function(b){return !b.az||!b.nn}).length;
  var stockAlerts=S.loaded?S.items.filter(function(i){return i.sellable<5}).length:0;
  var tabs=[{id:"overview",l:"Overview",icon:"◆"},{id:"buybox",l:"Buy Box",icon:"⬡",badge:lc},{id:"stock",l:"Stock",icon:"⬢",badge:stockAlerts},{id:"ai",l:"AI Insights",icon:"✦"}];
  var nav=tabs.map(function(t){return'<div class="nav-tab'+(S.tab===t.id?" active":"")+'" onclick="goTab(\''+t.id+'\')"><span>'+t.icon+'</span><span>'+t.l+'</span>'+(t.badge>0?'<span class="nav-badge">'+t.badge+'</span>':"")+'</div>';}).join("");
  var page="";
  if(S.tab==="overview") page=renderOverview();
  if(S.tab==="buybox")   page=renderBuyBox();
  if(S.tab==="stock")    page=renderStock();
  if(S.tab==="ai")       page=renderAI();
  var syncLabel=S.loading?"Loading "+S.progress+"%...":(S.loaded?"↻ Synced "+esc(S.lastSync):"↻ Sync Zoho");
  document.getElementById("app").innerHTML=
    '<header class="header"><div class="header-inner"><div class="logo">Shelf<span>IQ</span></div><div class="header-right"><button class="sync-btn" onclick="syncZoho()" '+(S.loading?"disabled":"")+'>'+syncLabel+'</button><div class="alert-pill"><div class="pulse"></div>'+lc+' Buy Box Alerts</div></div></div></header>'
    +'<nav class="nav"><div class="nav-inner">'+nav+'</div></nav>'
    +'<main class="main">'+page+'</main>';
}

function goTab(t){S.tab=t;render()}
function setWHFilter(f){S.whFilter=f;S.page=1;render()}
function setStatusFilter(f){S.statusFilter=f;S.page=1;render()}
function setSortField(f){S.sortBy=f;S.page=1;render()}
function toggleSortDir(){S.sortDir=S.sortDir==="asc"?"desc":"asc";S.page=1;render()}
function setSort(f){if(S.sortBy===f)toggleSortDir();else{S.sortBy=f;S.sortDir="asc";S.page=1;render();}}
function setPage(p){var f=getFiltered();var tp=Math.ceil(f.length/S.perPage)||1;S.page=Math.max(1,Math.min(p,tp));render()}
function clearAllFilters(){S.searchApplied="";S.whFilter="all";S.statusFilter="all";S.page=1;render();setTimeout(function(){var i=document.getElementById("searchInput");if(i)i.value="";},10)}
function doSearch(){var inp=document.getElementById("searchInput");if(inp){S.searchApplied=inp.value.trim();S.page=1;render();}}
function clearSearch(){S.searchApplied="";S.page=1;render();setTimeout(function(){var i=document.getElementById("searchInput");if(i)i.value="";},10)}

render();
</script>
</body>
</html>
