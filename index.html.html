<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ShelfIQ — Seller Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070d1a;--surface:#0e1625;--surface2:#131e30;
  --border:#1c2d44;--border2:#243650;
  --teal:#00e5c3;--teal-dim:rgba(0,229,195,0.12);
  --red:#ff4757;--red-dim:rgba(255,71,87,0.12);
  --amber:#ffb020;--amber-dim:rgba(255,176,32,0.12);
  --blue:#4d9fff;--blue-dim:rgba(77,159,255,0.12);
  --purple:#b44fff;--purple-dim:rgba(180,79,255,0.12);
  --text:#d8e4f0;--text2:#6b83a0;--text3:#3d566e;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:0;z-index:100}
.header-inner{max-width:1500px;margin:0 auto;height:56px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--teal);white-space:nowrap}
.logo span{color:var(--text2);font-weight:400}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sync-btn{background:var(--teal-dim);border:1px solid var(--teal);color:var(--teal);padding:4px 12px;border-radius:20px;font-size:11px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .2s;white-space:nowrap}
.sync-btn:hover{background:var(--teal);color:#050d1a}
.sync-btn:disabled{opacity:.4;cursor:not-allowed}
.alert-pill{background:var(--red-dim);border:1px solid var(--red);color:var(--red);padding:3px 12px;border-radius:20px;font-size:11px;display:flex;align-items:center;gap:6px;white-space:nowrap}
.pulse{width:6px;height:6px;background:var(--red);border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.nav{background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-inner{max-width:1500px;margin:0 auto;display:flex;padding:0 16px}
.nav-tab{padding:13px 16px;font-size:12px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;user-select:none}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--teal);border-bottom-color:var(--teal)}
.nav-badge{background:var(--red);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px}
.main{max-width:1500px;margin:0 auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.page{display:flex;flex-direction:column;gap:16px}
.grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px}
.card-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
.stat-label{font-size:10px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px}
.stat-value{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;margin-bottom:3px}
.stat-sub{font-size:11px;color:var(--text2)}
.up{color:var(--teal)!important}.down{color:var(--red)!important}
/* TABLE */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:700px}
th{text-align:left;padding:9px 12px;color:var(--text2);font-size:10px;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border);white-space:nowrap;font-family:'Syne',sans-serif;position:sticky;top:0;background:var(--surface)}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:500;white-space:nowrap}
.b-green{background:var(--teal-dim);color:var(--teal);border:1px solid rgba(0,229,195,.3)}
.b-red{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,71,87,.3)}
.b-amber{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(255,176,32,.3)}
.b-blue{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(77,159,255,.3)}
.b-purple{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(180,79,255,.3)}
.b-gray{background:rgba(107,131,160,.1);color:var(--text2);border:1px solid rgba(107,131,160,.2)}
/* WH PILLS */
.wh-cell{display:flex;flex-wrap:wrap;gap:4px}
.wh-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:4px;font-size:10px;white-space:nowrap}
.wh-pragati{background:rgba(0,229,195,.1);color:var(--teal);border:1px solid rgba(0,229,195,.25)}
.wh-amazon{background:rgba(255,153,0,.12);color:#ff9900;border:1px solid rgba(255,153,0,.25)}
.wh-noon{background:rgba(255,237,0,.08);color:#d4c200;border:1px solid rgba(255,237,0,.2)}
.wh-micro{background:rgba(77,159,255,.1);color:var(--blue);border:1px solid rgba(77,159,255,.25)}
.wh-damage{background:rgba(255,71,87,.1);color:var(--red);border:1px solid rgba(255,71,87,.25)}
/* FILTERS */
.filters-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.search-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-size:12px;font-family:'JetBrains Mono',monospace;outline:none;transition:border-color .2s;min-width:200px;flex:1;max-width:320px}
.search-box:focus{border-color:var(--teal)}
.search-box::placeholder{color:var(--text3)}
.fbtn{padding:6px 12px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:'JetBrains Mono',monospace;transition:all .15s;user-select:none;white-space:nowrap}
.fbtn:hover{border-color:var(--border2);color:var(--text)}
.fbtn.on{background:var(--teal-dim);border-color:var(--teal);color:var(--teal)}
.fbtn.on-amber{background:var(--amber-dim);border-color:var(--amber);color:var(--amber)}
.fbtn.on-red{background:var(--red-dim);border-color:var(--red);color:var(--red)}
.fbtn.on-blue{background:var(--blue-dim);border-color:var(--blue);color:var(--blue)}
.fbtn.on-amazon{background:rgba(255,153,0,.12);border-color:rgba(255,153,0,.5);color:#ff9900}
.fbtn.on-noon{background:rgba(255,237,0,.08);border-color:rgba(255,237,0,.4);color:#d4c200}
/* PAGINATION */
.pagination{display:flex;align-items:center;gap:8px;justify-content:center;padding-top:8px;flex-wrap:wrap}
.page-btn{padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:'JetBrains Mono',monospace;transition:all .15s}
.page-btn:hover{border-color:var(--border2);color:var(--text)}
.page-btn.active{background:var(--teal-dim);border-color:var(--teal);color:var(--teal)}
.page-info{font-size:11px;color:var(--text2)}
/* PROGRESS */
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:var(--teal);border-radius:2px;transition:width .3s}
/* MISC */
.sh{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:4px}
.ss{font-size:12px;color:var(--text2);margin-bottom:8px}
.sbar-wrap{display:flex;align-items:center;gap:6px}
.sbar{height:4px;width:50px;background:var(--border);border-radius:2px;overflow:hidden;flex-shrink:0}
.sbar-fill{height:100%;border-radius:2px}
.legend{display:flex;gap:16px;margin-bottom:10px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}
.ldot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.chart-svg{width:100%;overflow:visible;display:block}
.think{display:flex;gap:5px;align-items:center;color:var(--text2);font-size:12px;padding:14px 0}
.tdot{width:6px;height:6px;background:var(--teal);border-radius:50%;animation:blink 1.2s infinite}
.tdot:nth-child(2){animation-delay:.2s}.tdot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
.ai-bar{display:flex;gap:10px;margin-bottom:14px}
.ai-inp{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13px;font-family:'JetBrains Mono',monospace;outline:none;transition:border-color .2s}
.ai-inp:focus{border-color:var(--teal)}
.ai-inp::placeholder{color:var(--text3)}
.ai-send{background:var(--teal);color:#050d1a;border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;white-space:nowrap}
.ai-send:disabled{opacity:.4;cursor:not-allowed}
.ai-resp{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--teal);border-radius:8px;padding:20px;font-size:13px;line-height:1.8;white-space:pre-wrap}
.qbtns{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.qbtn{padding:7px 12px;border:1px solid var(--border);background:var(--surface2);border-radius:20px;font-size:11px;color:var(--text2);cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .15s}
.qbtn:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-dim)}
.empty{text-align:center;padding:36px 20px;color:var(--text2);font-size:13px}
.alert-bar{background:var(--red-dim);border:1px solid rgba(255,71,87,.35);border-radius:8px;padding:12px 16px;font-size:12px;display:flex;gap:10px}
.divider{font-size:10px;color:var(--text3);padding:0 4px}
@media(max-width:900px){
  .grid-5{grid-template-columns:repeat(3,1fr)}
  .grid-4{grid-template-columns:repeat(2,1fr)}
  .grid-2{grid-template-columns:1fr}
  .main{padding:12px}
  .stat-value{font-size:20px}
  .sh{font-size:17px}
}
@media(max-width:500px){
  .grid-5,.grid-4{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
var CFG = {
  clientId:     "1000.YP18H8EL66LTCD8BV180DV0QWWOEED",
  clientSecret: "4607a9cf0e7c96ba7d78823c2e80afa82d8c5da8f1",
  refreshToken: "1000.0426f8f9af39975baaca5b381694e469.c054da30f79cb8c5557f97982897f9e2",
  orgId:        "873562075",
  api:          "https://www.zohoapis.com/books/v3",
  auth:         "https://accounts.zoho.com/oauth/v2/token",
  proxy:        "https://corsproxy.io/?"
};

// Warehouse name matching keywords
var WH_RULES = {
  pragati:  ["pragati","praga"],
  amazon:   ["amazon","fba"],
  noon:     ["noon","fbn"],
  micro:    ["microless","fbm","micro"],
  damage:   ["renewed","wh-d","damage","damaged","wh_d"],
  supermall:["supermall","super mall","reserved"]
};

function classifyWH(name) {
  if(!name) return "other";
  var n = name.toLowerCase();
  for(var k in WH_RULES) {
    var kws = WH_RULES[k];
    for(var i=0;i<kws.length;i++) {
      if(n.indexOf(kws[i])!==-1) return k;
    }
  }
  return "other";
}

// ── STATE ─────────────────────────────────────────────────────────────────────
var S = {
  tab:"overview",
  items:[],        // processed items with warehouse breakdown
  loading:false,
  loaded:false,
  error:null,
  lastSync:null,
  loadProgress:0,
  totalPages:0,
  accessToken:null,
  // stock tab filters
  search:"",
  whFilter:"all",  // all | pragati | amazon | noon | micro | damage
  statusFilter:"all", // all | instock | low | out
  page:1,
  perPage:50,
};

// Demo buy box data
var DEMO_BB=[
  {sku:"NVD-RTX4070",  name:"NVIDIA RTX 4070 GPU",   az:true, nn:false,azP:2199,nnP:2350,lost:"14:32 today",lostOn:"Noon"},
  {sku:"APL-IP15-128", name:"iPhone 15 128GB Black",  az:false,nn:true, azP:3299,nnP:3199,lost:"09:15 today",lostOn:"Amazon UAE"},
  {sku:"SNG-WH1000XM5",name:"Sony WH-1000XM5",        az:true, nn:true, azP:1099,nnP:1099,lost:null,         lostOn:null},
  {sku:"SMG-S24U-256", name:"Samsung S24 Ultra",       az:false,nn:false,azP:4599,nnP:4450,lost:"Yesterday",  lostOn:"Both"},
  {sku:"DYS-V15",      name:"Dyson V15 Detect",        az:true, nn:true, azP:2799,nnP:2799,lost:null,         lostOn:null},
  {sku:"PLY-PS5-SLIM", name:"PlayStation 5 Slim",      az:true, nn:false,azP:1999,nnP:2150,lost:"08:00 today",lostOn:"Noon"},
];
var BB_HIST=[
  {d:"Mon",az:75,nn:82},{d:"Tue",az:80,nn:78},{d:"Wed",az:72,nn:85},
  {d:"Thu",az:85,nn:80},{d:"Fri",az:78,nn:75},{d:"Sat",az:82,nn:88},{d:"Sun",az:87,nn:83}
];
var REV=[
  {m:"Oct",az:42,nn:28},{m:"Nov",az:48,nn:31},{m:"Dec",az:61,nn:44},
  {m:"Jan",az:39,nn:26},{m:"Feb",az:52,nn:35},{m:"Mar",az:55,nn:38}
];

// ── ZOHO API ──────────────────────────────────────────────────────────────────
async function getToken() {
  try {
    var url = CFG.proxy + encodeURIComponent(
      CFG.auth+"?refresh_token="+CFG.refreshToken+
      "&client_id="+CFG.clientId+
      "&client_secret="+CFG.clientSecret+
      "&grant_type=refresh_token"
    );
    var r = await fetch(url,{method:"POST"});
    var d = await r.json();
    if(d.access_token){ S.accessToken=d.access_token; return d.access_token; }
    return null;
  } catch(e){ return null; }
}

async function fetchPage(token, page) {
  var url = CFG.proxy + encodeURIComponent(
    CFG.api+"/items?organization_id="+CFG.orgId+
    "&page="+page+"&per_page=200&filter_by=item.All"
  );
  var r = await fetch(url,{headers:{"Authorization":"Zoho-oauthtoken "+token}});
  return await r.json();
}

function processItem(raw) {
  // Build warehouse breakdown
  var wh = {pragati:0, amazon:0, noon:0, micro:0, damage:0, other:0};
  var whDetails = raw.warehouses || [];
  whDetails.forEach(function(w){
    var cls = classifyWH(w.warehouse_name);
    if(cls === "supermall") return; // exclude
    var qty = w.warehouse_stock_on_hand || 0;
    if(wh[cls] !== undefined) wh[cls] += qty;
    else wh.other += qty;
  });

  // Sellable = pragati + amazon + noon + micro (NOT damage, NOT supermall, NOT other unless needed)
  var sellable = wh.pragati + wh.amazon + wh.noon + wh.micro;
  var total = sellable + wh.damage + wh.other;

  // Fallback if no warehouse data
  if(whDetails.length === 0) {
    sellable = raw.stock_on_hand || 0;
    total = sellable;
  }

  return {
    id:       raw.item_id,
    name:     raw.name || "",
    sku:      raw.sku || raw.item_id,
    rate:     raw.rate || 0,
    sellable: sellable,
    damage:   wh.damage,
    pragati:  wh.pragati,
    amazon:   wh.amazon,
    noon:     wh.noon,
    micro:    wh.micro,
    total:    total,
    status:   raw.status || "active",
  };
}

async function syncZoho() {
  S.loading=true; S.error=null; S.loadProgress=0; S.totalPages=0;
  S.items=[]; S.loaded=false;
  render();

  var token = await getToken();
  if(!token){
    S.loading=false;
    S.error="Could not connect to Zoho. Check your internet connection and try again.";
    render(); return;
  }

  try {
    // First page to get total count
    var first = await fetchPage(token,1);
    if(!first || first.code !== 0){
      S.loading=false;
      S.error="Zoho returned an error: "+(first?first.message:"No response");
      render(); return;
    }

    var perPage = 200;
    var totalCount = (first.page_context && first.page_context.total) || first.items.length;
    var totalPages = Math.ceil(totalCount / perPage);
    S.totalPages = totalPages;

    var allItems = (first.items||[]).map(processItem);
    S.loadProgress = Math.round((1/totalPages)*100);
    render();

    // Fetch remaining pages
    for(var p=2; p<=totalPages; p++){
      var page = await fetchPage(token,p);
      if(page && page.items){
        allItems = allItems.concat(page.items.map(processItem));
      }
      S.loadProgress = Math.round((p/totalPages)*100);
      render();
    }

    S.items = allItems;
    S.loaded = true;
    S.loading = false;
    S.lastSync = new Date().toLocaleTimeString("en-AE",{hour:"2-digit",minute:"2-digit"});
    S.page = 1;
    render();

  } catch(e) {
    S.loading=false;
    S.error="Unexpected error loading data. Please try again.";
    render();
  }
}

// ── FILTER + PAGINATE ─────────────────────────────────────────────────────────
function getFiltered() {
  var items = S.items;
  // Search
  if(S.search.trim()) {
    var q = S.search.toLowerCase();
    items = items.filter(function(i){
      return i.name.toLowerCase().indexOf(q)!==-1 || i.sku.toLowerCase().indexOf(q)!==-1;
    });
  }
  // Warehouse filter
  if(S.whFilter !== "all") {
    items = items.filter(function(i){
      if(S.whFilter==="pragati") return i.pragati > 0;
      if(S.whFilter==="amazon")  return i.amazon  > 0;
      if(S.whFilter==="noon")    return i.noon    > 0;
      if(S.whFilter==="micro")   return i.micro   > 0;
      if(S.whFilter==="damage")  return i.damage  > 0;
      return true;
    });
  }
  // Status filter
  if(S.statusFilter !== "all") {
    items = items.filter(function(i){
      if(S.statusFilter==="out")  return i.sellable <= 0;
      if(S.statusFilter==="low")  return i.sellable > 0 && i.sellable < 5;
      if(S.statusFilter==="good") return i.sellable >= 5;
      return true;
    });
  }
  return items;
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function num(n){return Number(n||0)}

function stockBadge(qty){
  if(qty<=0)  return '<span class="badge b-red">Out of Stock</span>';
  if(qty<5)   return '<span class="badge b-amber">Low: '+qty+'</span>';
  if(qty<20)  return '<span class="badge b-blue">'+qty+' units</span>';
  return '<span class="badge b-green">'+qty+' units</span>';
}

function whPills(item){
  var pills="";
  if(item.pragati>0) pills+='<span class="wh-pill wh-pragati">PRAGATI '+item.pragati+'</span>';
  if(item.amazon>0)  pills+='<span class="wh-pill wh-amazon">FBA '+item.amazon+'</span>';
  if(item.noon>0)    pills+='<span class="wh-pill wh-noon">FBN '+item.noon+'</span>';
  if(item.micro>0)   pills+='<span class="wh-pill wh-micro">FBM '+item.micro+'</span>';
  if(item.damage>0)  pills+='<span class="wh-pill wh-damage">DMG '+item.damage+'</span>';
  if(!pills) pills='<span style="color:var(--text3);font-size:11px">No warehouse data</span>';
  return '<div class="wh-cell">'+pills+'</div>';
}

function lineChart(data,k1,k2,c1,c2){
  var W=500,H=155,PL=34,PR=8,PT=8,PB=24;
  var cw=W-PL-PR,ch=H-PT-PB;
  var allV=[];data.forEach(function(d){allV.push(d[k1],d[k2])});
  var mn=Math.min.apply(null,allV)-5,mx=Math.max.apply(null,allV)+5;
  var xs=data.map(function(_,i){return PL+i*(cw/(data.length-1))});
  function fy(v){return PT+ch-(((v-mn)/(mx-mn))*ch)}
  var svg='<svg viewBox="0 0 '+W+' '+H+'" class="chart-svg">';
  [0,.25,.5,.75,1].forEach(function(t){
    var yy=PT+ch*t,val=Math.round(mx-(mx-mn)*t);
    svg+='<line x1="'+PL+'" y1="'+yy+'" x2="'+(W-PR)+'" y2="'+yy+'" stroke="#1c2d44" stroke-width="1"/>';
    svg+='<text x="'+(PL-3)+'" y="'+(yy+4)+'" text-anchor="end" fill="#6b83a0" font-size="9" font-family="monospace">'+val+'</text>';
  });
  data.forEach(function(d,i){svg+='<text x="'+xs[i]+'" y="'+(H-3)+'" text-anchor="middle" fill="#6b83a0" font-size="9" font-family="monospace">'+esc(d.d)+'</text>'});
  var p1=data.map(function(d,i){return xs[i]+","+fy(d[k1])}).join(" ");
  var p2=data.map(function(d,i){return xs[i]+","+fy(d[k2])}).join(" ");
  svg+='<polyline points="'+p1+'" fill="none" stroke="'+c1+'" stroke-width="2" stroke-linejoin="round"/>';
  svg+='<polyline points="'+p2+'" fill="none" stroke="'+c2+'" stroke-width="2" stroke-linejoin="round"/>';
  data.forEach(function(d,i){
    svg+='<circle cx="'+xs[i]+'" cy="'+fy(d[k1])+'" r="3" fill="'+c1+'"/>';
    svg+='<circle cx="'+xs[i]+'" cy="'+fy(d[k2])+'" r="3" fill="'+c2+'"/>';
  });
  return svg+'</svg>';
}

function barChart(data,k1,k2,c1,c2){
  var W=500,H=155,PL=38,PR=8,PT=8,PB=24;
  var cw=W-PL-PR,ch=H-PT-PB;
  var allV=[];data.forEach(function(d){allV.push(d[k1],d[k2])});
  var mx=Math.max.apply(null,allV)*1.1;
  var grpW=cw/data.length,bw=(grpW*0.7)/2;
  var svg='<svg viewBox="0 0 '+W+' '+H+'" class="chart-svg">';
  [0,.25,.5,.75,1].forEach(function(t){
    var yy=PT+ch*t,val=Math.round(mx*(1-t)/1000);
    svg+='<line x1="'+PL+'" y1="'+yy+'" x2="'+(W-PR)+'" y2="'+yy+'" stroke="#1c2d44" stroke-width="1"/>';
    svg+='<text x="'+(PL-3)+'" y="'+(yy+4)+'" text-anchor="end" fill="#6b83a0" font-size="9" font-family="monospace">'+val+'k</text>';
  });
  data.forEach(function(d,i){
    var gx=PL+i*grpW+(grpW*0.15),cx=gx+bw;
    svg+='<text x="'+cx+'" y="'+(H-3)+'" text-anchor="middle" fill="#6b83a0" font-size="9" font-family="monospace">'+esc(d.m)+'</text>';
    var bh1=(d[k1]/mx)*ch,by1=PT+ch-bh1,bh2=(d[k2]/mx)*ch,by2=PT+ch-bh2;
    svg+='<rect x="'+gx+'" y="'+by1+'" width="'+(bw-1)+'" height="'+bh1+'" fill="'+c1+'" rx="2"/>';
    svg+='<rect x="'+(gx+bw)+'" y="'+by2+'" width="'+(bw-1)+'" height="'+bh2+'" fill="'+c2+'" rx="2"/>';
  });
  return svg+'</svg>';
}

    +'<div class="qbtns">'
    +'<button class="qbtn" onclick="askAI(\'Which products are running critically low or out of stock?\')">Critical stock alerts</button>'
    +'<button class="qbtn" onclick="askAI(\'Which products have damage stock in WH-D that I should write off or repackage?\')">Damage stock advice</button>'
    +'<button class="qbtn" onclick="askAI(\'Which products are at FBA or FBN but running low there?\')">FBA / FBN low stock</button>'
    +'<button class="qbtn" onclick="askAI(\'What are my top priorities this week to improve sales?\')">Weekly priorities</button>'
    +'<button class="qbtn" onclick="askAI(\'Which products should I move from PRAGATI to FBA or FBN?\')">Stock transfer advice</button>'
    +'</div>'
    +'<div class="ai-bar"><input class="ai-inp" id="aiInp" placeholder="Ask anything about your inventory, pricing, or sales strategy..." onkeydown="if(event.key===\'Enter\')askAI()"/>'
    +'<button class="ai-send" id="aiSend" onclick="askAI()">Ask AI \u2192</button></div>'
    +'<div id="aiOut"><div class="empty"><div style="font-size:26px;margin-bottom:8px">\uD83E\uDD16</div>'
    +(S.loaded?'<div>Your real inventory is loaded! Ask anything about your <strong>'+S.items.length+' products</strong></div>'
    :'<div>Sync Zoho Books first for AI powered by your real data</div>')
    +'</div></div></div></div>';
}

async function askAI(q){
  var inp=document.getElementById("aiInp");
  var out=document.getElementById("aiOut");
  var btn=document.getElementById("aiSend");
  var query=q||(inp?inp.value.trim():"");
  if(!query)return;
  if(inp&&q)inp.value=q;
  out.innerHTML='<div class="think"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div><span style="margin-left:8px">Analysing your data...</span></div>';
  if(btn)btn.disabled=true;
  var sys=window._AISYS||"You are an e-commerce consultant for Amazon UAE and Noon in Dubai.";
  try{
    var res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,messages:[{role:"user",content:query}]})});
    var data=await res.json();
    var text=(data.content||[]).map(function(b){return b.text||""}).join("")||"No response.";
    out.innerHTML='<div class="ai-resp">'+text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")+'</div>';
  }catch(e){out.innerHTML='<div class="ai-resp" style="border-left-color:var(--red)">\u26a0 Could not reach AI.</div>';}
  if(btn)btn.disabled=false;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  var lostCount=DEMO_BB.filter(function(b){return !b.az||!b.nn}).length;
  var stockAlerts=S.loaded?S.items.filter(function(i){return i.sellable<5}).length:0;
  var TABS=[
    {id:"overview", l:"Overview",    icon:"&#9672;"},
    {id:"buybox",   l:"Buy Box",     icon:"&#11041;",badge:lostCount},
    {id:"stock",    l:"Stock",       icon:"&#11042;",badge:stockAlerts},
    {id:"ai",       l:"AI Insights", icon:"&#10022;"},
  ];
  var nav=TABS.map(function(t){
    return '<div class="nav-tab'+(S.tab===t.id?" active":"")+'" onclick="goTab(\''+t.id+'\')">'
      +'<span>'+t.icon+'</span><span>'+t.l+'</span>'
      +(t.badge>0?'<span class="nav-badge">'+t.badge+'</span>':"")+'</div>';
  }).join("");
  var page="";
  if(S.tab==="overview") page=renderOverview();
  if(S.tab==="buybox")   page=renderBuyBox();
  if(S.tab==="stock")    page=renderStock();
  if(S.tab==="ai")       page=renderAI();
  var syncLabel=S.loading?"Loading "+S.loadProgress+"%...":(S.loaded?"\u21bb Synced "+esc(S.lastSync):"\u21bb Sync Zoho");
  document.getElementById("app").innerHTML=
    '<header class="header"><div class="header-inner"><div class="logo">Shelf<span>IQ</span></div>'
    +'<div class="header-right">'
    +'<button class="sync-btn" onclick="syncZoho()" '+(S.loading?"disabled":"")+'>'+syncLabel+'</button>'
    +'<div class="alert-pill"><div class="pulse"></div>'+lostCount+' Buy Box Alerts</div>'
    +'</div></div></header>'
    +'<nav class="nav"><div class="nav-inner">'+nav+'</div></nav>'
    +'<main class="main">'+page+'</main>';
}

function goTab(t){S.tab=t;render()}
function setSearch(v){S.search=v;S.page=1;render()}
function setWHFilter(f){S.whFilter=f;S.page=1;render()}
function setStatusFilter(f){S.statusFilter=f;S.page=1;render()}
function setPage(p){var f=getFiltered();var tp=Math.ceil(f.length/S.perPage);S.page=Math.max(1,Math.min(p,tp));render()}

render();
</script>
</body>
</html>
